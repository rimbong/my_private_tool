<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>텍스트 비교 (Diff)</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --editor-bg: #ffffff;
      --add-bg: #e6ffed;
      --add-text: #046c4e;
      --del-bg: #ffebe9;
      --del-text: #b91c1c;
      --gutter-bg: #f8fafc;
      --gutter-text: #94a3b8;
    }
    body.dark {
      --primary: #818cf8;
      --primary-hover: #a5b4fc;
      --bg: #0d1117;
      --card-bg: #161b22;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --border: #30363d;
      --editor-bg: #0d1117;
      --add-bg: #12261e;
      --add-text: #7ee787;
      --del-bg: #25171c;
      --del-text: #ff7b72;
      --gutter-bg: #161b22;
      --gutter-text: #6e7681;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
      transition: background 0.2s, color 0.2s;
    }
    header {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
      padding: 1rem 1.5rem; background: var(--card-bg); border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0; font-size: 1.25rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem; }
    .toolbar { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .btn {
      padding: 0.5rem 0.9rem; border-radius: 0.5rem; border: 1px solid var(--border);
      font-weight: 700; font-size: 0.85rem; cursor: pointer; background: var(--card-bg); color: var(--text); transition: all 0.15s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--primary); color: var(--primary); }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); color: #fff; }
    label.opt { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; display: inline-flex; align-items: center; gap: 0.3rem; cursor: pointer; }

    .inputs { display: flex; gap: 0; min-height: 38%; border-bottom: 1px solid var(--border); }
    .inputs .pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .inputs .pane + .pane { border-left: 1px solid var(--border); }
    .pane-head { padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); background: var(--card-bg); border-bottom: 1px solid var(--border); }
    textarea {
      flex: 1; border: none; outline: none; resize: none; padding: 0.75rem 1rem;
      font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 0.85rem; line-height: 1.5;
      background: var(--editor-bg); color: var(--text); tab-size: 2;
    }

    .result { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .result-head {
      padding: 0.5rem 1rem; font-size: 0.8rem; font-weight: 800; color: var(--text-muted);
      background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; gap: 1rem; align-items: center;
    }
    .pill { font-size: 0.75rem; padding: 0.15rem 0.6rem; border-radius: 999px; font-weight: 800; }
    .pill.add { background: var(--add-bg); color: var(--add-text); }
    .pill.del { background: var(--del-bg); color: var(--del-text); }
    .diff-view {
      flex: 1; overflow: auto; background: var(--editor-bg);
      font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 0.85rem; line-height: 1.55;
    }
    table.diff { border-collapse: collapse; width: 100%; }
    table.diff td { padding: 0 0.5rem; vertical-align: top; white-space: pre-wrap; word-break: break-word; }
    td.gutter {
      width: 1%; text-align: right; color: var(--gutter-text); background: var(--gutter-bg);
      user-select: none; border-right: 1px solid var(--border); padding: 0 0.6rem; white-space: nowrap;
    }
    td.sign { width: 1%; text-align: center; user-select: none; color: var(--text-muted); padding: 0 0.4rem; }
    tr.add td.content { background: var(--add-bg); color: var(--add-text); }
    tr.add td.sign { color: var(--add-text); }
    tr.del td.content { background: var(--del-bg); color: var(--del-text); }
    tr.del td.sign { color: var(--del-text); }
    .empty-msg { padding: 3rem; text-align: center; color: var(--text-muted); }
    /* 줄 내 변경 강조 (word diff) */
    .diff td.content .wd { border-radius: 2px; padding: 0 1px; }
    tr.del td.content .wd { background: rgba(244,63,94,0.40); }
    tr.add td.content .wd { background: rgba(16,185,129,0.40); }
    body.dark tr.del td.content .wd { background: rgba(255,123,114,0.38); }
    body.dark tr.add td.content .wd { background: rgba(126,231,135,0.30); }
    textarea.drag-hover { box-shadow: inset 0 0 0 3px var(--primary); }

    /* 결과 헤더 컨트롤 (세그/네비) */
    .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; }
    .seg button { border: none; background: var(--card-bg); color: var(--text-muted); padding: 0.35rem 0.75rem; font-weight: 800; font-size: 0.78rem; cursor: pointer; }
    .seg button.active { background: var(--primary); color: #fff; }
    .nav-btn-sm { padding: 0.3rem 0.55rem; border-radius: 0.4rem; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: 800; }
    .nav-btn-sm:hover { border-color: var(--primary); color: var(--primary); }

    /* 같은 줄 접기 마커 */
    .collapse-cell { text-align: center; color: var(--text-muted); background: var(--gutter-bg); cursor: pointer; padding: 0.35rem; font-size: 0.78rem; font-weight: 700; user-select: none; }
    .collapse-cell:hover { color: var(--primary); background: var(--bg); }

    /* 변경 이동 강조 */
    tr.flash td { animation: diffflash 0.8s ease-out; }
    @keyframes diffflash { from { background: rgba(99,102,241,0.35); } to { background: transparent; } }

    /* 줄 번호 칸: 자릿수에 맞춰 자동 너비 + 줄바꿈 금지 (1000+ 4자리 대응) */
    table.diff td.gutter { word-break: normal; white-space: nowrap; }
    /* 나란히(split) 보기 — 자동 레이아웃으로 줄 번호 칸이 내용에 맞게 늘어남 */
    table.diff.split { width: 100%; }
    table.diff.split td.content { width: 50%; }
    table.diff.split tr > td:nth-child(2) { border-right: 2px solid var(--border); }
    td.content.cell-del { background: var(--del-bg); color: var(--del-text); }
    td.content.cell-add { background: var(--add-bg); color: var(--add-text); }
    td.content.cell-empty { background: var(--gutter-bg); }
    td.content.cell-del .wd { background: rgba(244,63,94,0.40); border-radius: 2px; }
    td.content.cell-add .wd { background: rgba(16,185,129,0.40); border-radius: 2px; }
    body.dark td.content.cell-del .wd { background: rgba(255,123,114,0.38); }
    body.dark td.content.cell-add .wd { background: rgba(126,231,135,0.30); }
  </style>
  <script src="lib/portal-theme.js"></script>
  <script src="lib/file-drop-handler.js"></script>
  <script src="lib/toast-utils.js"></script>
</head>
<body>
  <header>
    <h1>🔍 텍스트 비교</h1>
    <div class="toolbar">
      <label class="opt"><input type="checkbox" id="optTrim" checked> 끝 공백 무시</label>
      <label class="opt"><input type="checkbox" id="optCase"> 대소문자 무시</label>
      <label class="opt"><input type="checkbox" id="optBlank"> 빈 줄 무시</label>
      <label class="opt"><input type="checkbox" id="optWS"> 공백 전체 무시</label>
      <button class="btn" onclick="swap()">⇄ 좌우 교체</button>
      <button class="btn btn-primary" onclick="runDiff()">비교 실행</button>
      <button class="btn" onclick="copyDiff()">📋 결과 복사</button>
      <button class="btn" onclick="loadSample()">샘플</button>
      <button class="btn" onclick="clearAll()">비우기</button>
    </div>
  </header>

  <div class="inputs">
    <div class="pane">
      <div class="pane-head">원본 (A)</div>
      <textarea id="left" placeholder="원본 텍스트를 붙여넣으세요..." spellcheck="false"></textarea>
    </div>
    <div class="pane">
      <div class="pane-head">변경본 (B)</div>
      <textarea id="right" placeholder="비교할 텍스트를 붙여넣으세요..." spellcheck="false"></textarea>
    </div>
  </div>

  <div class="result">
    <div class="result-head">
      <span>비교 결과</span>
      <span class="pill add" id="addCount">+0</span>
      <span class="pill del" id="delCount">-0</span>
      <span id="sameMsg" style="color:var(--text-muted); font-weight:600;"></span>
      <span style="flex:1;"></span>
      <button class="nav-btn-sm" onclick="gotoChange(-1)" title="이전 변경">◀</button>
      <button class="nav-btn-sm" onclick="gotoChange(1)" title="다음 변경">변경 ▶</button>
      <div class="seg">
        <button id="segUnified" class="active" onclick="setDiffView('unified')">통합</button>
        <button id="segSplit" onclick="setDiffView('split')">나란히</button>
      </div>
    </div>
    <div class="diff-view" id="diffView">
      <div class="empty-msg">양쪽에 텍스트를 입력하고 <b>비교 실행</b>을 누르세요.<br>입력을 바꾸면 자동으로 다시 비교합니다.</div>
    </div>
  </div>

  <script>
    const left = document.getElementById('left');
    const right = document.getElementById('right');
    const diffView = document.getElementById('diffView');

    let debounceTimer;
    [left, right].forEach(el => el.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(runDiff, 350);
    }));
    document.querySelectorAll('.opt input').forEach(c => c.addEventListener('change', runDiff));

    let lastDiffText = '';

    function normalize(line) {
      let s = line;
      if (document.getElementById('optWS').checked) s = s.replace(/\s+/g, '');
      else if (document.getElementById('optTrim').checked) s = s.replace(/\s+$/, '');
      if (document.getElementById('optCase').checked) s = s.toLowerCase();
      return s;
    }

    function splitLines(text) {
      let lines = text.replace(/\r\n?/g, '\n').split('\n');
      // 마지막 빈 줄이 1개면 제거 (편집기 개행 보정)
      if (lines.length > 1 && lines[lines.length - 1] === '') lines.pop();
      return lines;
    }

    /* LCS 기반 줄 단위 diff */
    function computeDiff(aLines, bLines) {
      const ignoreBlank = document.getElementById('optBlank').checked;
      const a = aLines.map(normalize);
      const b = bLines.map(normalize);
      const n = a.length, m = b.length;

      // LCS DP 테이블
      const dp = Array.from({ length: n + 1 }, () => new Int32Array(m + 1));
      for (let i = n - 1; i >= 0; i--) {
        for (let j = m - 1; j >= 0; j--) {
          if (a[i] === b[j]) dp[i][j] = dp[i + 1][j + 1] + 1;
          else dp[i][j] = Math.max(dp[i + 1][j], dp[i][j + 1]);
        }
      }
      const rows = [];
      let i = 0, j = 0;
      while (i < n && j < m) {
        if (a[i] === b[j]) {
          rows.push({ type: 'same', a: aLines[i], b: bLines[j], ai: i + 1, bi: j + 1 });
          i++; j++;
        } else if (dp[i + 1][j] >= dp[i][j + 1]) {
          rows.push({ type: 'del', a: aLines[i], ai: i + 1 });
          i++;
        } else {
          rows.push({ type: 'add', b: bLines[j], bi: j + 1 });
          j++;
        }
      }
      while (i < n) { rows.push({ type: 'del', a: aLines[i], ai: i + 1 }); i++; }
      while (j < m) { rows.push({ type: 'add', b: bLines[j], bi: j + 1 }); j++; }

      if (ignoreBlank) {
        return rows.filter(r => {
          if (r.type === 'same') return true;
          const content = r.type === 'del' ? r.a : r.b;
          return content.trim() !== '';
        });
      }
      return rows;
    }

    function esc(s) {
      return (s == null ? '' : s).replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]));
    }

    /* 두 줄 사이의 바뀐 토큰만 강조 (단어 단위 LCS) */
    function inlineDiff(a, b) {
      const ta = a.match(/\s+|\S+/g) || [];
      const tb = b.match(/\s+|\S+/g) || [];
      const n = ta.length, m = tb.length;
      const dp = Array.from({ length: n + 1 }, () => new Int32Array(m + 1));
      for (let i = n - 1; i >= 0; i--) for (let j = m - 1; j >= 0; j--) dp[i][j] = ta[i] === tb[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
      let i = 0, j = 0, aOut = '', bOut = '';
      while (i < n && j < m) {
        if (ta[i] === tb[j]) { aOut += esc(ta[i]); bOut += esc(tb[j]); i++; j++; }
        else if (dp[i + 1][j] >= dp[i][j + 1]) { aOut += `<span class="wd">${esc(ta[i])}</span>`; i++; }
        else { bOut += `<span class="wd">${esc(tb[j])}</span>`; j++; }
      }
      while (i < n) { aOut += `<span class="wd">${esc(ta[i])}</span>`; i++; }
      while (j < m) { bOut += `<span class="wd">${esc(tb[j])}</span>`; j++; }
      return { a: aOut, b: bOut };
    }

    /* ===== 결과 렌더링 (통합/나란히 + 같은 줄 접기 + 변경 이동) ===== */
    const CONTEXT = 3;          // 변경 주변에 보여줄 동일 줄 수
    let diffBlocks = [];
    let expanded = new Set();   // 펼친 동일 블록 인덱스
    let viewMode = 'unified';
    let changeAnchors = [], curChange = -1;

    function runDiff() {
      const aText = left.value, bText = right.value;
      if (!aText && !bText) {
        diffView.innerHTML = '<div class="empty-msg">양쪽에 텍스트를 입력하고 <b>비교 실행</b>을 누르세요.</div>';
        document.getElementById('addCount').textContent = '+0';
        document.getElementById('delCount').textContent = '-0';
        document.getElementById('sameMsg').textContent = '';
        lastDiffText = ''; diffBlocks = [];
        return;
      }
      const rows = computeDiff(splitLines(aText), splitLines(bText));
      diffBlocks = buildBlocks(rows);
      expanded.clear();

      let added = 0, deleted = 0;
      const copyLines = [];
      rows.forEach(r => {
        if (r.type === 'same') copyLines.push('  ' + r.a);
        else if (r.type === 'del') { deleted++; copyLines.push('- ' + r.a); }
        else { added++; copyLines.push('+ ' + r.b); }
      });
      lastDiffText = copyLines.join('\n');
      document.getElementById('addCount').textContent = '+' + added;
      document.getElementById('delCount').textContent = '-' + deleted;
      document.getElementById('sameMsg').textContent = (added === 0 && deleted === 0) ? '✅ 두 텍스트가 동일합니다.' : '';

      renderResult();
    }

    // 행들을 동일/변경 블록으로 묶고, 변경 블록은 단어 단위 강조 미리 계산
    function buildBlocks(rows) {
      const blocks = []; let i = 0;
      while (i < rows.length) {
        if (rows[i].type === 'same') {
          const same = []; while (i < rows.length && rows[i].type === 'same') { same.push(rows[i]); i++; }
          blocks.push({ type: 'same', rows: same });
        } else {
          const dels = [], adds = [];
          while (i < rows.length && rows[i].type !== 'same') { (rows[i].type === 'del' ? dels : adds).push(rows[i]); i++; }
          const pairs = Math.min(dels.length, adds.length), wd = [];
          for (let k = 0; k < pairs; k++) wd.push(inlineDiff(dels[k].a, adds[k].b));
          blocks.push({ type: 'change', dels, adds, wd, pairs });
        }
      }
      return blocks;
    }

    // 동일 블록 접기: [상단 context][접힘마커][하단 context]
    function foldSame(rows, idx, hasPrev, hasNext) {
      if (expanded.has(idx)) return { head: rows, hidden: 0, tail: [] };
      const keepTop = hasPrev ? CONTEXT : 0, keepBottom = hasNext ? CONTEXT : 0;
      if (rows.length <= keepTop + keepBottom + 2) return { head: rows, hidden: 0, tail: [] };
      return { head: rows.slice(0, keepTop), hidden: rows.length - keepTop - keepBottom, tail: keepBottom ? rows.slice(rows.length - keepBottom) : [] };
    }
    function collapseRow(idx, count) {
      return `<tr class="collapse-row"><td colspan="4" class="collapse-cell" onclick="expandBlock(${idx})">⋯ ${count}줄 동일 (클릭하여 펼치기) ⋯</td></tr>`;
    }

    function renderResult() {
      document.getElementById('segUnified').classList.toggle('active', viewMode === 'unified');
      document.getElementById('segSplit').classList.toggle('active', viewMode === 'split');
      if (!diffBlocks.length) return;
      diffView.innerHTML = viewMode === 'split' ? renderSplit() : renderUnified();
      changeAnchors = Array.from(diffView.querySelectorAll('[data-change]'));
      curChange = -1;
    }

    function sameRowU(r) { return `<tr class="same"><td class="gutter">${r.ai}</td><td class="gutter">${r.bi}</td><td class="sign"></td><td class="content">${esc(r.a)}</td></tr>`; }
    function renderUnified() {
      const out = ['<table class="diff"><tbody>'];
      diffBlocks.forEach((b, idx) => {
        if (b.type === 'same') {
          const f = foldSame(b.rows, idx, idx > 0, idx < diffBlocks.length - 1);
          f.head.forEach(r => out.push(sameRowU(r)));
          if (f.hidden > 0) out.push(collapseRow(idx, f.hidden));
          f.tail.forEach(r => out.push(sameRowU(r)));
        } else {
          let first = true;
          b.dels.forEach((d, k) => { out.push(`<tr class="del"${first ? ' data-change="1"' : ''}><td class="gutter">${d.ai}</td><td class="gutter"></td><td class="sign">-</td><td class="content">${k < b.pairs ? b.wd[k].a : esc(d.a)}</td></tr>`); first = false; });
          b.adds.forEach((ad, k) => { out.push(`<tr class="add"${first ? ' data-change="1"' : ''}><td class="gutter"></td><td class="gutter">${ad.bi}</td><td class="sign">+</td><td class="content">${k < b.pairs ? b.wd[k].b : esc(ad.b)}</td></tr>`); first = false; });
        }
      });
      out.push('</tbody></table>');
      return out.join('');
    }

    function renderSplit() {
      const cell = (num, content, cls) => `<td class="gutter">${num != null ? num : ''}</td><td class="content ${cls}">${content}</td>`;
      const out = ['<table class="diff split"><tbody>'];
      diffBlocks.forEach((b, idx) => {
        if (b.type === 'same') {
          const f = foldSame(b.rows, idx, idx > 0, idx < diffBlocks.length - 1);
          f.head.forEach(r => out.push(`<tr>${cell(r.ai, esc(r.a), '')}${cell(r.bi, esc(r.b), '')}</tr>`));
          if (f.hidden > 0) out.push(collapseRow(idx, f.hidden));
          f.tail.forEach(r => out.push(`<tr>${cell(r.ai, esc(r.a), '')}${cell(r.bi, esc(r.b), '')}</tr>`));
        } else {
          const maxLen = Math.max(b.dels.length, b.adds.length);
          for (let k = 0; k < maxLen; k++) {
            const d = b.dels[k], ad = b.adds[k];
            const lC = d ? (k < b.pairs ? b.wd[k].a : esc(d.a)) : '';
            const rC = ad ? (k < b.pairs ? b.wd[k].b : esc(ad.b)) : '';
            out.push(`<tr${k === 0 ? ' data-change="1"' : ''}>${cell(d ? d.ai : null, lC, d ? 'cell-del' : 'cell-empty')}${cell(ad ? ad.bi : null, rC, ad ? 'cell-add' : 'cell-empty')}</tr>`);
          }
        }
      });
      out.push('</tbody></table>');
      return out.join('');
    }

    function setDiffView(mode) { viewMode = mode; renderResult(); }
    function expandBlock(idx) { expanded.add(idx); renderResult(); }
    function gotoChange(dir) {
      if (!changeAnchors.length) { showToast('변경 사항이 없습니다.', 'info'); return; }
      curChange = (curChange + dir + changeAnchors.length) % changeAnchors.length;
      const el = changeAnchors[curChange];
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 800);
    }

    function swap() {
      const t = left.value; left.value = right.value; right.value = t;
      runDiff();
    }

    function clearAll() {
      left.value = ''; right.value = '';
      runDiff();
      left.focus();
    }

    function loadSample() {
      left.value = `function greet(name) {\n  console.log("Hello, " + name);\n  return true;\n}\n\nconst version = 1;`;
      right.value = `function greet(name, lang) {\n  console.log("안녕, " + name);\n  return true;\n}\n\nconst version = 2;\nconst debug = false;`;
      runDiff();
    }

    function copyDiff() {
      if (!lastDiffText) { showToast('복사할 비교 결과가 없습니다.', 'warning'); return; }
      navigator.clipboard.writeText(lastDiffText).then(
        () => showToast('비교 결과를 복사했습니다. (+/- 형식)', 'success'),
        () => showToast('복사에 실패했습니다.', 'error')
      );
    }

    // 파일 드래그앤드롭으로 양쪽 불러오기
    [left, right].forEach(el => fileDropHandler.init(el, {
      onText: (content) => { el.value = content; runDiff(); },
      onImage: () => showToast('이미지는 지원하지 않습니다.', 'warning')
    }));
  </script>
</body>
</html>
