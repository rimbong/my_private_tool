    /* --- 텍스트 추출 (마크다운 제거) --- */
    const plainOutput = document.getElementById('plainOutput');
    let previewMode = 'preview';

    // 인라인 마크다운(굵게/기울임/링크/이미지/코드 등)을 읽기 좋은 평문으로 변환
    function inlineToText(s) {
      if (!s) {
        return '';
      }
      let t = s;
      t = t.replace(/!\[([^\]]*)\]\([^)]*\)/g, (m, alt) => alt ? `[이미지: ${alt}]` : '[이미지]');
      t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, txt, url) => {
        const u = (url || '').trim();
        return (u && u !== txt) ? `${txt} (${u})` : txt;   // 링크는 '텍스트 (URL)' 형태로 보존
      });
      t = t.replace(/\*\*([^*]+)\*\*/g, '$1');             // **굵게**
      t = t.replace(/__([^_]+)__/g, '$1');
      t = t.replace(/\*([^*]+)\*/g, '$1');                 // *기울임*
      t = t.replace(/(^|[^\w])_([^_]+)_(?=[^\w]|$)/g, '$1$2'); // _기울임_ (단어 내부 _ 는 제외)
      t = t.replace(/~~([^~]+)~~/g, '$1');                 // ~~취소선~~
      t = t.replace(/`([^`]+)`/g, '$1');                   // `인라인 코드`
      t = t.replace(/<[^>]+>/g, '');                       // HTML 태그
      return t;
    }

    // 표 정렬용: 표시 폭(한글/전각 문자는 2칸)
    function dispWidth(s) {
      let w = 0;
      for (const ch of (s || '')) {
        const c = ch.codePointAt(0);
        if ((c >= 0x1100 && c <= 0x115f) || (c >= 0x2e80 && c <= 0xa4cf) ||
            (c >= 0xac00 && c <= 0xd7a3) || (c >= 0xf900 && c <= 0xfaff) ||
            (c >= 0xfe30 && c <= 0xfe4f) || (c >= 0xff00 && c <= 0xff60) ||
            (c >= 0xffe0 && c <= 0xffe6) || (c >= 0x20000 && c <= 0x3fffd)) {
          w += 2;
        } else {
          w += 1;
        }
      }
      return w;
    }
    function padDisp(s, width) {
      return s + ' '.repeat(Math.max(0, width - dispWidth(s)));
    }
    // 표시 폭 기준 줄바꿈(단어 단위, 한 단어가 너무 길면 강제 분해)
    function wrapDisp(s, max) {
      const words = (s || '').split(/\s+/).filter(Boolean);
      const lines = [];
      let cur = '';
      for (let w of words) {
        while (dispWidth(w) > max) {
          let part = '';
          for (const ch of w) { if (dispWidth(part + ch) > max) {
            break;
          } part += ch; }
          if (cur) {
            lines.push(cur);
            cur = '';
          }
          lines.push(part);
          w = w.slice(part.length);
        }
        if (!cur) {
          cur = w;
        } else if (dispWidth(cur + ' ' + w) <= max) {
          cur += ' ' + w;
        } else {
          lines.push(cur);
          cur = w;
        }
      }
      if (cur) {
        lines.push(cur);
      }
      return lines.length ? lines : [''];
    }

    // 마크다운 표 → 행별 레코드 블록으로 변환 (요약 없이 전체 내용 보존)
    //   ━━ [n] ━━━━
    //   라벨 : 값            (값이 길면 다음 줄을 값 시작 위치에 정렬)
    function tableToBlocks(headers, dataRows) {
      const VALW = 60;                 // 값 줄바꿈 폭
      const DIV = 46;                  // 구분선 목표 폭
      // 첫 칸이 번호열(#/번호/No/순번 또는 1~2자리 숫자)이면 [n]으로 승격하고 본문에서 제외
      const firstIsIndex = /^(#|no\.?|번호|순번)$/i.test((headers[0] || '').trim()) ||
        (dataRows.length > 0 && dataRows.every(r => /^\d{1,2}$/.test((r[0] || '').trim())));
      const numCol = firstIsIndex ? 0 : -1;
      const hasHeader = headers.some(h => h);
      const bodyCols = headers.map((_, idx) => idx).filter(idx => idx !== numCol);
      const labels = bodyCols.map(idx => hasHeader ? inlineToText(headers[idx]) : '');
      const labelW = labels.some(l => l) ? Math.max(...labels.map(dispWidth)) : 0;

      const out = [];
      dataRows.forEach((row, idx) => {
        const n = numCol >= 0 ? (row[numCol] || '').trim() : String(idx + 1);
        const prefix = `━━ [${n}] `;
        out.push(prefix + '━'.repeat(Math.max(3, DIV - dispWidth(prefix))));
        bodyCols.forEach((col, bi) => {
          const val = inlineToText(row[col] || '');
          const head = labelW ? `${padDisp(labels[bi], labelW)} : ` : '';
          const indent = ' '.repeat(dispWidth(head));
          const wrapped = wrapDisp(val, VALW);
          out.push(head + (wrapped[0] || ''));
          for (let k = 1; k < wrapped.length; k++) {
            out.push(indent + wrapped[k]);
          }
        });
        out.push('');
      });
      return out.join('\n').trimEnd();
    }

    // 마크다운 전체를 가독성 있는 평문으로 변환 (표 → 리스트, 헤더 → 구분선 등)
    function markdownToText(md) {
      if (!md) {
        return '';
      }
      const lines = md.replace(/\r\n?/g, '\n').split('\n');
      const out = [];
      let i = 0;

      const isTableSep = (line) => line.includes('-') &&
        /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)*\|?\s*$/.test(line);
      const splitRow = (line) => line.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => c.trim());

      while (i < lines.length) {
        const line = lines[i];

        // 코드 블록(펜스): 내용은 그대로 보존
        const fence = line.match(/^\s*(```|~~~)/);
        if (fence) {
          const token = fence[1];
          const code = [];
          i++;
          while (i < lines.length && !lines[i].trim().startsWith(token)) {
            code.push(lines[i]);
            i++;
          }
          i++; // 닫는 펜스 건너뜀
          if (code.length) {
            out.push(code.join('\n'));
          }
          continue;
        }

        // 표: 헤더 + 구분선 패턴이면 행마다 레코드 블록으로 변환 (전체 내용 보존)
        if (line.includes('|') && i + 1 < lines.length && isTableSep(lines[i + 1])) {
          const headers = splitRow(line);
          i += 2; // 헤더행 + 구분선
          const dataRows = [];
          while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
            dataRows.push(splitRow(lines[i]));
            i++;
          }
          if (dataRows.length) {
            out.push(tableToBlocks(headers, dataRows));
          }
          continue;
        }

        // 헤더(ATX): 밑줄 대신 제목 '앞'에 계층 기호를 붙인다(시작/끝 헷갈리는 가로줄 제거).
        //   H1 ■ / H2 ▶ / H3 ▷ / H4~H6 · , 깊은 단계는 살짝 들여써서 계층을 표시
        const h = line.match(/^\s{0,3}(#{1,6})\s+(.+?)\s*#*\s*$/);
        if (h) {
          const level = h[1].length;
          const text = inlineToText(h[2]);
          const sym = ({ 1: '■', 2: '▶', 3: '▷' })[level] || '·';
          const indent = ' '.repeat(Math.max(0, level - 2) * 2);
          out.push('');
          out.push(`${indent}${sym} ${text}`);
          i++;
          continue;
        }

        // 수평선
        if (/^\s{0,3}([-*_])\s*(\1\s*){2,}$/.test(line)) {
          out.push('─'.repeat(40));
          i++;
          continue;
        }

        // 인용구
        const q = line.match(/^\s*>\s?(.*)$/);
        if (q) {
          out.push(`│ ${inlineToText(q[1])}`);
          i++;
          continue;
        }

        // 불릿/번호 리스트 (들여쓰기 보존, 불릿은 • 로 통일)
        const ul = line.match(/^(\s*)[-*+]\s+(.+)$/);
        if (ul) {
          out.push(`${ul[1]}• ${inlineToText(ul[2])}`);
          i++;
          continue;
        }
        const ol = line.match(/^(\s*)(\d+)\.\s+(.+)$/);
        if (ol) {
          out.push(`${ol[1]}${ol[2]}. ${inlineToText(ol[3])}`);
          i++;
          continue;
        }

        // 일반 문단
        out.push(inlineToText(line));
        i++;
      }

      return out.join('\n').replace(/\n{3,}/g, '\n\n').trim();
    }

    function updatePlain() {
      const cleaned = markdownToText(editor.value);
      plainOutput.value = cleaned;
      const words = cleaned.trim() ? cleaned.trim().split(/\s+/).filter(Boolean).length : 0;
      const chars = cleaned.length;
      const noSpace = cleaned.replace(/\s/g, '').length;
      document.getElementById('textCounts').textContent = `단어 ${words} · 글자 ${chars} · 공백제외 ${noSpace}`;
    }

    function setPreviewMode(mode) {
      previewMode = mode;
      const isText = mode === 'text';
      document.getElementById('segPreview').classList.toggle('active', !isText);
      document.getElementById('segText').classList.toggle('active', isText);

    async function copyPlain() {
      if (!plainOutput.value) {
        showToast('추출할 텍스트가 없습니다.', 'warning');
        return;
      }
      try {
        await navigator.clipboard.writeText(plainOutput.value);
        showToast('순수 텍스트를 복사했습니다.', 'success');
      } catch (e) {
        showToast('복사에 실패했습니다.', 'error');
      }
    }

    function downloadPlain() {
      if (!plainOutput.value) {
        showToast('다운로드할 텍스트가 없습니다.', 'warning');
        return;
      }
      const blob = new Blob([plainOutput.value], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'extracted-text.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Debounce function to limit rendering frequency
    function debounce(func, timeout = 300) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => { func.apply(this, args); }, timeout);
      };
    }

    const debouncedUpdate = debounce(() => {
      updatePreview();
      if (previewMode === 'text') {
        updatePlain();
      }
      saveToDB();
    }, 300);

    editor.addEventListener('input', debouncedUpdate);
    // 탭 전환/닫기/새로고침 직전 마지막 편집분 저장(300ms 디바운스 대기 중 유실 방지)
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        saveToDB();
      }
    });

    // Persistence Logic
    async function initStorage() {
      try {
        await dbManager.init('MDViewerDB', ['content', 'images', 'docs']);
        // 저장된 이미지 토큰 복원
        const storedImgs = await dbManager.getAll('images');
        Object.entries(storedImgs || {}).forEach(([token, val]) => imageStore.set(token, val));
        // 문서 목록 로드 (없으면 기존 단일 문서 자동 이관) + 탭 렌더
        await loadAllDocs();

        // 폴더 드래그앤드롭: 디렉터리를 통째로 떨어뜨리면 그룹으로 불러온다 (file:// 에서도 동작)
        function readAllEntries(reader) {
          // { entries, error }: file:// 페이지에선 readEntries 가 EncodingError 로 실패한다(디렉터리 못 읽음)
          return new Promise((resolve) => {
            const all = [];
            const step = () => reader.readEntries((es) => {
              if (!es.length) {
                resolve({ entries: all, error: false });
                return;
              }
              all.push(...es);
              step();   // readEntries 는 100개씩 끊어서 준다 → 반복 호출
            }, () => resolve({ entries: all, error: true }));
            step();
          });
        }
        function entryToFile(entry) {
          return new Promise((resolve) => entry.file((f) => resolve(f), () => resolve(null)));
        }
        // 성공 시 true, 디렉터리 읽기 실패(file:// 제한 등) 시 false 반환
        async function collectEntry(entry, prefix, out) {
          if (entry.isFile) {
            const f = await entryToFile(entry);
            if (f) {
              out.push({ file: f, rel: prefix + entry.name });
            }
            return true;
          }
          if (entry.isDirectory) {
            const res = await readAllEntries(entry.createReader());
            if (res.error) {
              return false;
            }
            let ok = true;
            for (const k of res.entries) {
              if (!(await collectEntry(k, prefix + entry.name + '/', out))) {
                ok = false;
              }
            }
            return ok;
          }
          return true;
        }
        // 파일 드래그 시 브라우저가 파일을 여는 기본동작 차단(드롭 허용 커서)
        document.addEventListener('dragover', (e) => {
          if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files')) {
            e.preventDefault();
          }
        }, true);
        document.addEventListener('drop', async (e) => {
          const items = e.dataTransfer && e.dataTransfer.items;
          if (!items || !items.length) {
            return;
          }
          // webkitGetAsEntry 는 drop 시점에 동기적으로 읽어야 함(이후 items 무효화)
          const roots = [];
          let hasDir = false;
          for (let i = 0; i < items.length; i++) {
            const it = items[i];
            const entry = it.webkitGetAsEntry ? it.webkitGetAsEntry() : null;
            if (entry) {
              if (entry.isDirectory) {
                hasDir = true;
              }
              roots.push(entry);
            }
          }
          if (!hasDir) {
            // 폴더가 아님 → 텍스트 파일이 2개 이상이면 각각 새 문서로 불러온다.
            // (fileDropHandler 는 파일마다 onText 를 호출해 '새로 쓰기'는 마지막만 남고
            //  '이어붙이기'는 읽기-쓰기 경쟁으로 유실되므로, 다중 파일은 여기서 배치 처리)
            const dropped = Array.from((e.dataTransfer && e.dataTransfer.files) || []);
            const isTextFile = (f) => {
              const ext = fileExt(f.name);
              return ext === 'md' || ext === 'markdown' || ext === 'txt' || (f.type || '').startsWith('text/');
            };
            const textFiles = dropped.filter(isTextFile);
            if (textFiles.length >= 2) {
              e.preventDefault();
              e.stopPropagation();
              document.querySelectorAll('.drag-hover').forEach((el) => el.classList.remove('drag-hover'));
              const imageFiles = dropped.filter(f => (f.type || '').startsWith('image/') || IMG_EXTS.includes(fileExt(f.name)));
              await importTextFilesAsDocs(textFiles, imageFiles);
              return;
            }
            return;   // 단일 파일/이미지 → 기존 파일 드롭 핸들러(editor)에 맡김
          }
          e.preventDefault();
          e.stopPropagation();
          // editor 의 드롭 리스너를 건너뛰므로(stopPropagation) 드래그 하이라이트를 직접 해제
          document.querySelectorAll('.drag-hover').forEach((el) => el.classList.remove('drag-hover'));
          let totalFiles = 0;
          let readErr = false;
          for (const root of roots) {
            if (!root.isDirectory) {
              continue;
            }
            const out = [];
            const ok = await collectEntry(root, '', out);
            if (!ok) {
              readErr = true;
            }
            totalFiles += out.length;
            if (out.length) {
              await importFolderFiles(out, root.name);
            }
          }
          if (!totalFiles && readErr) {
            // file:// 페이지의 브라우저 제한: 드래그로는 폴더 내용을 못 읽는다 → 버튼 안내
            showToast("이 페이지(file://)에서는 폴더 드래그로 내용을 읽지 못합니다. 상단 '📁 폴더 열기' 버튼으로 폴더를 선택하세요.", 'warning', 6000);
          }
        }, true);   // 캡처 단계 → editor 드롭 핸들러보다 먼저 가로챔

        // Initialize File Drop Handler
        fileDropHandler.init(editor, {
          onImage: (base64, file) => {
            const token = addImage(base64, file.name);
            fileDropHandler.insertAtCursor(editor, `\n![${file.name}](img:${token})\n`);
            showToast(`이미지 '${file.name}'가 첨부되었습니다.`, 'success');
          },
          onText: (content, file) => {
            // 인라인 base64 이미지는 토큰으로 자동 접기
            const folded = foldDataImages(content);
            content = folded.text;
            const imgNote = folded.count ? ` (이미지 ${folded.count}개 접음)` : '';
            if (appendMode) {
              // 이어붙이기: 현재 문서 끝에 구분선과 함께 추가
              const prefix = editor.value.trim() ? `${editor.value.replace(/\s+$/, '')}\n\n--- [Dropped: ${file.name}] ---\n\n` : '';
              editor.value = prefix + content;
              updatePreview();
              if (previewMode === 'text') {
                updatePlain();
              }
              saveToDB();
              showToast(`파일 '${file.name}'의 내용이 이어붙여졌습니다.${imgNote}`, 'success');
            } else {
              // 새로 쓰기: 현재 탭의 내용을 덮어씀 (새 탭 생성하지 않음)
              editor.value = content;
              updatePreview();
              if (previewMode === 'text') {
                updatePlain();
              }
              saveToDB();
              showToast(`파일 '${file.name}'의 내용을 현재 탭에 불러왔습니다.${imgNote}`, 'success');
            }
          }
        });

        enableSync();   // 같은 브라우저의 다른 탭/창과 실시간 동기화 시작
      } catch (err) {
        console.error('Failed to init DB:', err);
        // DB 실패 시에도 인메모리 문서 1개로 동작 (영속만 안 됨)
        if (docs.length === 0) {
          docs.push({ id: genDocId(), title: deriveTitle(initialContent), content: initialContent, customTitle: false, updatedAt: Date.now() });
        }
        activeDocId = docs[0].id;
        loadDoc(activeDocId);
      }
    }

    function saveToDB() {
      const doc = getActiveDoc();
      if (!doc) {
        return;
      }
      const prevTitle = doc.title;
      doc.content = editor.value;
      if (!doc.customTitle) {
        doc.title = deriveTitle(doc.content);
      }
      doc.updatedAt = Date.now();
      persistDoc(doc);
      if (doc.title !== prevTitle) {
        renderTabs();
      }  // 자동 제목이 바뀌면 탭 갱신
    }

    /* ===== 탭/창 간 실시간 동기화 (같은 브라우저, 서버 불필요) =====
       원리: 한 창이 IndexedDB에 저장하면 BroadcastChannel로 "변경됨"을 알리고,
       다른 창은 DB에서 다시 읽어 반영한다. 단, 편집 중인 에디터는 덮어쓰지 않는다. */
    const SYNC_NAME = 'md-viewer-sync';
    const tabId = Math.random().toString(36).slice(2) + Date.now().toString(36);
    let syncBC = null;
    let syncReady = false;       // 초기 로드 완료 전엔 broadcast 하지 않음
    let applyingRemote = false;  // 원격 변경 반영 중엔 재-broadcast 하지 않음(루프 방지)
    let syncOutTimer = null, syncInTimer = null;

    function showSyncBanner(id) {
      const el = document.getElementById('syncBanner');
      if (el) {
        el.style.display = 'inline-flex';
      }
    }
    function hideSyncBanner() {
      const el = document.getElementById('syncBanner');
      if (el) {
        el.style.display = 'none';
      }
    }
    // 배너 클릭 → 보호 무시하고 원격 내용으로 강제 새로고침
    function pullRemote() {
      applyRemote(true);
    }

    function notifySync() {
      if (!syncBC || !syncReady || applyingRemote) {
        return;
      }
      clearTimeout(syncOutTimer);
      syncOutTimer = setTimeout(() => {
        try {
          syncBC.postMessage({ from: tabId, t: Date.now() });
        } catch (e) {}
      }, 250);
    }

    function scheduleRemoteReload() {
      clearTimeout(syncInTimer);
      syncInTimer = setTimeout(applyRemote, 150);
    }

    // 다른 창의 변경을 DB에서 다시 읽어 반영 (편집 중 에디터는 보호)
    // force=true 면 보호를 무시하고 강제로 원격 내용을 반영(새로고침 배너 클릭 시)
    async function applyRemote(force) {
      if (!dbManager.db || applyingRemote) {
        return;
      }
      applyingRemote = true;
      try {
        const prevActive = activeDocId;
        const editing = (document.activeElement === editor);
        const localActive = getActiveDoc();
        // 디바운스 저장 대기 중인 미저장 입력 여부 (DB로 되돌리면 유실되므로 보호 대상)
        const localUnsaved = !!localActive && editor.value !== localActive.content;

        const all = (await dbManager.getAll('docs')) || {};
        const order = await dbManager.getItem('content', 'doc_order');
        const savedVisible = await dbManager.getItem('content', 'visible_docs');

        // 다른 탭이 추가한 이미지도 반영한다. imageStore(메모리 Map)는 최초 1회만 채워지므로,
        // 크로스탭 동기화 시 이미지를 다시 읽지 않으면 받는 탭에서 '이미지 없음'으로 뜨고
        // 그 상태로 저장/복사하면 미해결 ](img:token) 이 출력에 그대로 남는다.
        const remoteImgs = (await dbManager.getAll('images')) || {};
        Object.entries(remoteImgs).forEach(([token, val]) => {
          if (!imageStore.has(token)) {
            imageStore.set(token, val);
          }
        });

        const rebuilt = [];
        if (Array.isArray(order) && order.length) {
          order.forEach(id => { if (all[id]) {
            rebuilt.push(all[id]);
          } });
          Object.keys(all).forEach(id => { if (!order.includes(id)) {
            rebuilt.push(all[id]);
          } });
        } else {
          Object.values(all).forEach(d => rebuilt.push(d));
        }
        rebuilt.forEach(d => {
          if (typeof d.customTitle !== 'boolean') {
            d.customTitle = false;
          }
          if (!d.title) {
            d.title = deriveTitle(d.content);
          }
        });
        docs = rebuilt;

        visibleIds = Array.isArray(savedVisible)
          ? savedVisible.filter(id => docs.some(d => d.id === id))
          : visibleIds.filter(id => docs.some(d => d.id === id));

        // 탭 그룹 접힘 상태도 동기화(다른 창의 접기/펼침 반영)
        const remoteCollapsed = await dbManager.getItem('content', 'collapsed_tab_groups');
        if (Array.isArray(remoteCollapsed)) {
          collapsedTabGroups = new Set(remoteCollapsed);
        }

        if (docs.some(d => d.id === prevActive)) {
          activeDocId = prevActive;                       // 이 창이 보던 문서는 그대로 유지
          if (!visibleIds.includes(activeDocId)) {
            ensureVisible(activeDocId);
          }
          if (visibleIds.length === 0) {
            visibleIds = docs.slice(0, MAX_VISIBLE).map(d => d.id);
          }
          const cur = getActiveDoc();
          if (cur) {
            const remoteContent = cur.content;   // DB(다른 창)의 현재 내용
            if ((editing || localUnsaved) && !force) {
              // 편집 중이거나 미저장 입력이 있으면 내 내용을 지키고(유실 방지),
              // 토스트 대신 '새로고침' 배너로 동기화를 유도한다.
              if (localActive && remoteContent !== localActive.content) {
                showSyncBanner(activeDocId);
              }
              cur.content = editor.value;         // 모델도 내 에디터 값으로 유지
            } else if (editor.value !== remoteContent) {
              editor.value = remoteContent;       // 안전(또는 강제)하게 최신 내용 반영
              updatePreview();
              if (previewMode === 'text') {
                updatePlain();
              }
              hideSyncBanner();
            } else {
              hideSyncBanner();                   // 내용이 같아짐 → 배너 닫기
            }
          }
          renderTabs();
        } else if (docs.length) {
          if (visibleIds.length === 0) {
            visibleIds = docs.slice(0, MAX_VISIBLE).map(d => d.id);
          }
          loadDoc(visibleIds[0] || docs[0].id);           // 보던 문서가 삭제됨 → 남은 문서로
        } else {
          newDoc();                                        // 전부 사라짐 → 빈 새 문서
        }
      } catch (e) {
        console.error('sync apply failed', e);
      } finally {
        applyingRemote = false;
      }
    }

    function enableSync() {
      try {
        syncBC = new BroadcastChannel(SYNC_NAME);
        syncBC.onmessage = (ev) => {
          if (!ev || !ev.data || ev.data.from === tabId) {
            return;
          }   // 자기 자신 메시지는 무시
          scheduleRemoteReload();
        };
      } catch (e) {
        syncBC = null;
      }   // BroadcastChannel 미지원 시 동기화만 비활성(나머지는 정상)
      // 숨겼다 다시 보는 창은 한 번 더 최신화(놓친 메시지 대비)
      document.addEventListener('visibilitychange', () => { if (!document.hidden) {
        scheduleRemoteReload();
      } });
      syncReady = true;
    }

    // Initialize on load
    window.addEventListener('load', initStorage);

    // File Operations
    // ===== 폴더 열기 (폴더별 그룹 + 참조 이미지 해결) =====
    const IMG_EXTS = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'bmp', 'avif', 'ico'];
    function fileExt(name) {
      const m = /\.([^.]+)$/.exec(name || '');
      return m ? m[1].toLowerCase() : '';
    }
    function dirOf(path) {
      const i = path.lastIndexOf('/');
      return i >= 0 ? path.slice(0, i) : '';
    }
    function baseName(path) {
      const i = path.lastIndexOf('/');
      return i >= 0 ? path.slice(i + 1) : path;
    }
    // base(디렉토리) 기준으로 ref(상대경로)를 폴더 내 절대경로로 정규화. ../ ./ 처리.
    function resolveRelPath(baseDir, ref) {
      let parts;
      if (ref.charAt(0) === '/') {
        parts = ref.slice(1).split('/');
      } else {
        parts = (baseDir ? baseDir.split('/') : []).concat(ref.split('/'));
      }
      const out = [];
      for (const p of parts) {
        if (p === '' || p === '.') {
          continue;
        }
        if (p === '..') {
          out.pop();
        } else {
          out.push(p);
        }
      }
      return out.join('/');
    }
    // .md 본문의 상대경로 이미지 ![alt](path) 를 pathMap(정규화경로→img:토큰)으로 치환.
    // http/data/img: 로 시작하면 건드리지 않음. 파일명만 있고 유일하면 파일명 매칭 폴백.
    function rewriteImageRefs(md, mdPath, pathMap, nameMap) {
      const baseDir = dirOf(mdPath);
      return (md || '').replace(/(!\[[^\]]*\]\()\s*([^)\s]+)(\s*(?:"[^"]*"|'[^']*')?\s*\))/g, (whole, pre, url, post) => {
        if (/^(https?:|data:|img:|\/\/)/i.test(url)) {
          return whole;
        }
        let ref = url;
        if (ref.charAt(0) === '<' && ref.charAt(ref.length - 1) === '>') {
          ref = ref.slice(1, -1);
        }
        try {
          ref = decodeURIComponent(ref.replace(/\\/g, '/'));
        } catch (e) {
          ref = ref.replace(/\\/g, '/');
        }
        const abs = resolveRelPath(baseDir, ref);
        let token = pathMap[abs];
        if (!token) {
          const cand = nameMap[baseName(abs).toLowerCase()];
          if (cand && cand.length === 1) {
            token = cand[0];
          }
        }
        return token ? (pre + token + post) : whole;
      });
    }
    function readAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }
    function readAsTextP(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsText(file);
      });
    }

    // 드롭된 텍스트 파일 여러 개를 각각 새 문서로 불러온다(파일명이 제목).
    // 같은 드롭에 이미지가 섞여 있으면 마지막 새 문서 끝에 첨부한다.
    async function importTextFilesAsDocs(textFiles, imageFiles) {
      saveToDB();   // 현재 편집 중 문서 보존
      const newIds = [];
      for (const file of textFiles) {
        try {
          const { text } = foldDataImages(await readAsTextP(file));
          const base = (file.name || '문서').replace(/\.[^.]+$/, '');
          const doc = { id: genDocId(), title: base || deriveTitle(text), content: text, customTitle: !!base, updatedAt: Date.now() };
          docs.push(doc);
          persistDoc(doc);
          newIds.push(doc.id);
        } catch (e) { /* 개별 파일 실패는 건너뜀 */ }
      }
      if (!newIds.length) {
        showToast('불러올 수 있는 텍스트 파일이 없습니다.', 'warning');
        return;
      }
      if (imageFiles && imageFiles.length) {
        const lastDoc = docs.find(d => d.id === newIds[newIds.length - 1]);
        for (const img of imageFiles) {
          try {
            const token = addImage(await readAsDataURL(img), img.name);
            lastDoc.content += `\n\n![${img.name}](img:${token})\n`;
          } catch (e) { /* 개별 이미지 실패 무시 */ }
        }
        persistDoc(lastDoc);
      }
      newIds.forEach(id => ensureVisible(id));
      loadDoc(newIds[0]);   // 첫 파일로 전환(내부에서 노출/렌더 처리)
      persistMeta();
      showToast(`${newIds.length}개 파일을 새 문서로 불러왔어요.`, 'success');
    }
    // 폴더 파일 목록을 받아 그룹으로 불러온다. files: File[](webkitRelativePath 보유) 또는 {file, rel}[]
    async function importFolderFiles(files, groupName) {
      const list = files.map(f => (f.file ? f : { file: f, rel: (f.webkitRelativePath || f.name) }));
      const group = groupName || ((list[0] && list[0].rel.split('/')[0]) || '폴더');
      const pathMap = {};   // 정규화경로 → img:token
      const nameMap = {};   // 파일명(소문자) → [img:token]
      const mdFiles = [];
      let imgCount = 0;
      for (const { file, rel } of list) {
        const ext = fileExt(file.name);
        if (ext === 'md' || ext === 'markdown' || ext === 'txt') {
          mdFiles.push({ file, rel });
        } else if (IMG_EXTS.includes(ext)) {
          try {
            const token = 'img:' + addImage(await readAsDataURL(file), file.name);
            pathMap[rel] = token;
            const nm = baseName(rel).toLowerCase();
            (nameMap[nm] = nameMap[nm] || []).push(token);
            imgCount++;
          } catch (e) {}
        }
      }
      if (!mdFiles.length) {
        showToast(`'${group}' 폴더에 .md 문서가 없습니다.`, 'warning');
        return;
      }
      saveToDB();   // 현재 편집 중 문서 보존
      let added = 0;
      for (const { file, rel } of mdFiles) {
        try {
          const { text } = foldDataImages(await readAsTextP(file));
          const content = rewriteImageRefs(text, rel, pathMap, nameMap);
          const base = (file.name || '문서').replace(/\.[^.]+$/, '');
          const doc = { id: genDocId(), title: base || deriveTitle(content), content, customTitle: !!base, folder: group, updatedAt: Date.now() };
          docs.push(doc);
          persistDoc(doc);   // 탭엔 자동 노출하지 않고(뒤섞임 방지) 문서 관리자 그룹에만 추가
          added++;
        } catch (e) {}
      }
      persistMeta();
      renderTabs();
      openDocManager();   // 그룹으로 정리된 목록을 바로 보여줌
      showToast(`📁 '${group}' 에서 문서 ${added}개${imgCount ? `, 이미지 ${imgCount}개` : ''}를 불러왔습니다. (📚에서 그룹별로 열어보세요)`, 'success', 4500);
    }
    async function loadFolder(event) {
      const files = Array.from(event.target.files || []);
      event.target.value = '';
      if (files.length) {
        await importFolderFiles(files);
      }
    }

    function loadFile(event) {
      const file = event.target.files[0];
      if (!file) {
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        // 인라인 base64 이미지는 토큰으로 자동 접기 (외부 .md 대응)
        const { text, count } = foldDataImages(e.target.result);
        // 기존 문서를 덮어쓰지 않고 새 탭으로 연다
        const doc = newDoc(text);
        const base = (file.name || '문서').replace(/\.[^.]+$/, '');
        if (base) {
          doc.title = base;
          doc.customTitle = true;
        }
        doc.updatedAt = Date.now();
        persistDoc(doc);
        renderTabs();
        showToast(count ? `'${file.name}'을(를) 열고 이미지 ${count}개를 접었습니다.` : `'${file.name}'을(를) 새 탭으로 열었습니다.`, 'success');
      };
      reader.readAsText(file);
      event.target.value = '';   // 같은 파일을 다시 열 수 있도록 초기화
    }

    function saveFile() {
      const doc = getActiveDoc();
      const base = (doc && doc.title && doc.title !== '제목 없음') ? doc.title : 'document';
      const safe = base.replace(/[\\/:*?"<>|]/g, '_').replace(/\s+/g, ' ').trim().slice(0, 60) || 'document';
      const blob = new Blob([inlineImages(editor.value)], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = safe + '.md';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Copy Functions
    async function copyMarkdown() {
      try {
        await navigator.clipboard.writeText(inlineImages(editor.value));
        showToast('마크다운 원문이 복사되었습니다. (이미지 포함)', 'success');
      } catch (err) {
        showToast('복사에 실패했습니다.', 'error');
      }
    }

    async function copyHTML() {
      try {
        const html = preview.innerHTML;
        // Wrap in a div with markdown-body class to help some targets recognize styles if they support it
        // and to provide a consistent root.
        const wrappedHTML = `<div class="markdown-body">${html}</div>`;
        
        const blob = new Blob([wrappedHTML], { type: 'text/html' });
        const textBlob = new Blob([html], { type: 'text/plain' });
        
        const data = [new ClipboardItem({
          'text/html': blob,
          'text/plain': textBlob
        })];
        
        await navigator.clipboard.write(data);
        showToast('서식이 포함된 HTML로 복사되었습니다. (워드/메일 등에 붙여넣기 가능)', 'success');
      } catch (err) {
        console.error('Rich copy failed:', err);
        // Fallback to plain text copy
        try {
          await navigator.clipboard.writeText(preview.innerHTML);
          showToast('HTML 코드가 일반 텍스트로 복사되었습니다.', 'info');
        } catch (fallbackErr) {
          showToast('복사에 실패했습니다.', 'error');
        }
      }
    }

    async function clearAll() {
      // 현재 문서의 내용만 비운다 (다른 탭/공유 이미지는 보존)
      if (await confirmModal('현재 문서의 내용을 비우시겠습니까?')) {
        editor.value = '';
        updatePreview();
        saveToDB();
        editor.focus();
      }
    }

    // Resizer Logic
    let isResizing = false;

    resizer.addEventListener('mousedown', (e) => {
      isResizing = true;
      resizer.classList.add('active');
      document.body.classList.add('resizing');
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) {
        return;
      }
      
      const containerWidth = document.body.clientWidth;
      const newWidth = (e.clientX / containerWidth) * 100;
      
      if (newWidth > 10 && newWidth < 90) {
        editorContainer.style.width = `${newWidth}%`;
      }
    });

    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        resizer.classList.remove('active');
        document.body.classList.remove('resizing');
      }
    });

    // Modal Control
    let modalMode = 'preview';

    function renderModalView() {
      const isText = modalMode === 'text';
      document.getElementById('modalSegPreview').classList.toggle('active', !isText);
      document.getElementById('modalSegText').classList.toggle('active', isText);
      document.getElementById('modalPreview').style.display = isText ? 'none' : 'block';
      const mp = document.getElementById('modalPlain');
      mp.style.display = isText ? 'block' : 'none';
      document.getElementById('modalTextCopy').style.display = isText ? '' : 'none';
      document.getElementById('modalTip').style.display = isText ? 'none' : '';
      if (isText) {
        mp.value = markdownToText(editor.value);
      } else {
        document.getElementById('modalPreview').innerHTML = preview.innerHTML;
      } // 이미 실제 이미지로 치환된 상태
    }

    function setModalMode(mode) {
      modalMode = mode;
      renderModalView();
    }

    function openModal() {
      modalMode = previewMode === 'text' ? 'text' : 'preview'; // 현재 보던 모드 그대로 크게 열기
      renderModalView();
      const modal = document.getElementById('previewModal');
      modal.style.display = 'block';
      document.body.style.overflow = 'hidden'; // Prevent scrolling background
    }

    // 오른쪽 미리보기/텍스트 추출 영역을 더블클릭하면 크게 보기 실행 (모드 무관)
    function onPreviewDblClick(e) {
      // 텍스트 추출 textarea(#plainOutput) 안에서는 단어 선택(복사)이 우선 → 크게보기 미발동
      if (e && e.target && e.target.id === 'plainOutput') {
        return;
      }
      openModal();
    }

    async function copyModalPlain() {
      const v = document.getElementById('modalPlain').value;
      if (!v) {
        showToast('추출할 텍스트가 없습니다.', 'warning');
        return;
      }
      try {
        await navigator.clipboard.writeText(v);
        showToast('순수 텍스트를 복사했습니다.', 'success');
      } catch (e) {
        showToast('복사에 실패했습니다.', 'error');
      }
    }

    function closeModal() {
      document.getElementById('previewModal').style.display = 'none';
      document.body.style.overflow = '';
    }

    function printMarkdown() {
      const currentTheme = mdRenderer.theme;
      const isDark = currentTheme === 'dark';
      
      // Force light theme for printing to ensure best quality/ink usage
      if (isDark) {
        mdRenderer.applyTheme('light');
      }
      
      window.print();
      
      // Restore previous theme after print dialog closes
      if (isDark) {
        setTimeout(() => {
          mdRenderer.applyTheme('dark');
        }, 100);
      }
    }

    // Close modal on Esc key or clicking outside
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
        closeDocManager();
      }
      
      // Smart Ctrl+A (or Cmd+A) inside modal
      const modal = document.getElementById('previewModal');
      if (modal.style.display === 'block' && (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a') {
        e.preventDefault(); // Stop default "select all page"
        if (modalMode === 'text') {
          const mp = document.getElementById('modalPlain');
          mp.focus();
          mp.select();
        } else {
          const range = document.createRange();
          range.selectNodeContents(document.getElementById('modalPreview'));
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);
        }
      }
    });

    window.addEventListener('click', (e) => {
      const modal = document.getElementById('previewModal');
      if (e.target === modal) {
        closeModal();
      }
    });
  </script>
</body>
</html>
