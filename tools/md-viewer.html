<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <script src="lib/marked.min.js"></script>
  <script src="lib/highlight.min.js"></script>
  <script src="lib/db-manager.js"></script>
  <script src="lib/file-drop-handler.js"></script>
  <script src="lib/md-renderer.js"></script>
  <script src="lib/toast-utils.js"></script>
  <script src="lib/portal-theme.js"></script>
  <style>
    :root {
      --primary: #111827;
      --bg: #f9fafb;
      --header-bg: #ffffff;
      --border: #e5e7eb;
      --editor-bg: #f8fafc;
      --text: #111827;
      --sidebar-width: 50%;
      --accent: #3b82f6;       /* 탭 활성/호버 강조색 */
      --tab-border: #cbd5e1;   /* 탭 윤곽선(기본보다 진하게) */
    }

    body.dark-mode {
      --primary: #f9fafb;
      --bg: #0d1117;
      --header-bg: #161b22;
      --border: #30363d;
      --editor-bg: #0d1117;
      --text: #c9d1d9;
      --accent: #58a6ff;
      --tab-border: #4b5563;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color 0.2s, color 0.2s;
    }

    header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .title-group h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
    }

    .action-group {
      display: flex;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--header-bg);
      color: var(--text);
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--bg);
    }

    .btn-primary {
      background: var(--primary);
      color: var(--bg);
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary);
      color: var(--bg);
      opacity: 0.9;
    }

    /* Fullscreen Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: var(--header-bg);
      margin: 2vh auto;
      width: 90%;
      height: 96vh;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .modal-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--header-bg);
      user-select: none; /* Prevent accidental selection */
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      background: var(--header-bg);
    }

    /* --- 문서 탭 바 --- */
    .doc-tabs {
      display: flex;
      align-items: flex-end;
      background: var(--editor-bg);
      border-bottom: 2px solid var(--tab-border);
      padding: 0.45rem 0.5rem 0;
      gap: 0.4rem;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: thin;
    }
    .doc-tab-list { display: flex; align-items: flex-end; gap: 0.4rem; }
    .doc-tab {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 0.5rem 0.5rem 0.8rem;
      border: 1.5px solid var(--tab-border);
      border-bottom: none;
      border-radius: 0.6rem 0.6rem 0 0;
      background: var(--header-bg);
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
      max-width: 220px;
      position: relative;
      bottom: -2px;                 /* 바 하단선과 살짝 겹쳐 탭처럼 보이게 */
      box-shadow: 0 -1px 2px rgba(0,0,0,0.04);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .doc-tab:hover { border-color: var(--accent); color: var(--accent); }
    .doc-tab.active {
      background: var(--bg);
      border-color: var(--accent);
      border-top-width: 3px;        /* 상단 파란 강조선 */
      border-bottom: 2px solid var(--bg);  /* 활성 탭은 바 하단선을 덮어 본문과 이어짐 */
      font-weight: 700;
      color: var(--text);
      z-index: 1;
    }
    .doc-tab-title { overflow: hidden; text-overflow: ellipsis; max-width: 170px; }
    .doc-tab-close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px; height: 18px;
      border-radius: 50%;
      font-size: 0.72rem;
      opacity: 0.55;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    .doc-tab-close:hover { opacity: 1; background: var(--tab-border); }
    .doc-tab-add {
      align-self: center;
      margin: 0 0.2rem 0.2rem;
      border: 1.5px solid var(--tab-border);
      background: var(--header-bg);
      color: var(--text);
      width: 30px; height: 30px;
      border-radius: 0.45rem;
      cursor: pointer;
      font-size: 1.15rem;
      line-height: 1;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .doc-tab-add:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .editor-container {
      width: var(--sidebar-width);
      height: 100%;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--editor-bg);
    }

    #editor {
      flex: 1;
      border: none;
      padding: 1.5rem;
      font-family: 'Fira Code', 'Cascadia Code', source-code-pro, Menlo, Monaco, Consolas, 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
      background: transparent;
      color: inherit;
    }

    .preview-container {
      flex: 1;
      height: 100%;
      background: var(--header-bg);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .preview-scroll {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .view-seg {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
    }
    .seg-btn {
      border: none;
      background: var(--header-bg);
      color: var(--text);
      padding: 0.35rem 0.7rem;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .seg-btn.active { background: var(--primary); color: var(--bg); }

    .text-tools { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .counts { font-size: 0.8rem; opacity: 0.7; font-variant-numeric: tabular-nums; white-space: nowrap; }

    .plain-output {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      border: none;
      outline: none;
      resize: none;
      padding: 1.5rem;
      background: transparent;
      color: inherit;
      font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem;
    }

    @media (max-width: 767px) {
      main {
        flex-direction: column;
      }
      .editor-container {
        width: 100%;
        height: 50%;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .markdown-body {
        padding: 15px;
      }
      /* 헤더: 제목/액션 버튼 줄바꿈 + 컴팩트 */
      header { flex-wrap: wrap; gap: 0.5rem; padding: 0.6rem 0.9rem; }
      .title-group h1 { font-size: 1.1rem; }
      .action-group { flex-wrap: wrap; }
      .action-group .btn { padding: 0.45rem 0.7rem; font-size: 0.85rem; }
      .preview-toolbar { padding: 0.4rem 0.7rem; }
      .doc-tab { max-width: 150px; font-size: 0.78rem; padding: 0.35rem 0.45rem 0.35rem 0.6rem; }
      .doc-tab-title { max-width: 110px; }
    }

    .file-input {
      display: none;
    }

    .resizer {
      width: 8px;
      margin: 0 -4px;
      background: transparent;
      cursor: col-resize;
      z-index: 100;
      position: relative;
      transition: background 0.2s;
    }

    .resizer::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 0;
      width: 2px;
      height: 100%;
      background: var(--border);
    }

    .resizer:hover::after, .resizer.active::after {
      background: #3b82f6;
      width: 4px;
      left: 2px;
    }

    body.resizing {
      cursor: col-resize;
      user-select: none;
    }

    body.resizing #editor {
      pointer-events: none;
    }

    /* Drag & Drop Feedback */
    #editor.drag-hover {
      background: var(--primary-light, #f0f7ff);
      box-shadow: inset 0 0 0 3px #3b82f6;
      border-radius: 4px;
    }

    /* Print Styles */
    @media print {
      header, .editor-container, .resizer, .modal-header, .action-group, .btn, .preview-toolbar, .doc-tabs {
        display: none !important;
      }

      main {
        display: block !important;
        overflow: visible !important;
      }

      .preview-container {
        display: block !important;
        overflow: visible !important;
        height: auto !important;
        padding: 0 !important;
      }

      .preview-scroll {
        overflow: visible !important;
        height: auto !important;
      }

      .markdown-body {
        padding: 0 !important;
        margin: 0 !important;
        max-width: 100% !important;
        background: white !important;
        color: black !important;
      }

      #previewModal {
        display: none !important;
      }

      body {
        background: white !important;
        color: black !important;
        overflow: visible !important;
        height: auto !important;
      }
    }
  </style>
</head>
<body class="light-mode">
  <header>
    <div class="title-group">
      <h1>📝 마크다운</h1>
      <div class="action-group">
        <button class="btn" onclick="document.getElementById('fileInput').click()">파일 열기</button>
        <button class="btn" onclick="saveFile()">저장</button>
        <button class="btn" id="dropModeToggle" onclick="toggleDropMode()" title="드래그앤드롭 시 동작 방식">📄 드롭: 새로 쓰기</button>
        <button class="btn" onclick="compactInlineImages()" title="본문에 길게 박힌 data: 이미지를 짧은 토큰으로 접습니다">🖼️ 이미지 접기</button>
        <input type="file" id="fileInput" class="file-input" accept=".md,.txt" onchange="loadFile(event)">
      </div>
    </div>
    <div class="action-group">
      <button class="btn" id="themeToggle" onclick="toggleTheme()">🌙 다크 모드</button>
      <button class="btn" onclick="openModal()">🔍 크게 보기</button>
      <button class="btn" onclick="printMarkdown()">🖨️ 인쇄</button>
      <button class="btn" onclick="copyMarkdown()">MD 복사</button>
      <button class="btn" onclick="copyHTML()">HTML 복사</button>
      <button class="btn btn-ghost" onclick="clearAll()" style="color: var(--danger);">비우기</button>
    </div>
  </header>

  <div class="doc-tabs" id="docTabs">
    <div class="doc-tab-list" id="docTabList"></div>
    <button class="doc-tab-add" onclick="newDoc()" title="새 문서 추가">＋</button>
  </div>

  <main>
    <div class="editor-container" id="editorContainer">
      <textarea id="editor" placeholder="여기에 마크다운을 입력하세요..."></textarea>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="preview-container">
      <div class="preview-toolbar">
        <div class="view-seg">
          <button id="segPreview" class="seg-btn active" onclick="setPreviewMode('preview')">👁️ 미리보기</button>
          <button id="segText" class="seg-btn" onclick="setPreviewMode('text')">📄 텍스트 추출</button>
        </div>
        <div class="text-tools" id="textTools" style="display:none;">
          <span class="counts" id="textCounts">단어 0 · 글자 0 · 공백제외 0</span>
          <button class="btn" onclick="copyPlain()">📋 텍스트 복사</button>
          <button class="btn" onclick="downloadPlain()">💾 다운로드</button>
        </div>
      </div>
      <div class="preview-scroll" id="previewScroll">
        <div id="preview" class="markdown-body"></div>
        <textarea id="plainOutput" class="plain-output" readonly style="display:none;" placeholder="마크다운 문법이 제거된 순수 텍스트가 여기에 표시됩니다..."></textarea>
      </div>
    </div>
  </main>

  <!-- Fullscreen Preview Modal -->
  <div id="previewModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 style="margin:0; font-size:1.1rem;">🔍 전체 화면 미리보기</h2>
        <div style="display:flex; gap:0.5rem; align-items:center;">
          <span style="font-size:0.8rem; color:var(--text-muted); margin-right:1rem;">(Tip: Ctrl+A로 전체 선택 후 복사하세요)</span>
          <button class="btn btn-primary" onclick="printMarkdown()">🖨️ 인쇄 / PDF 저장</button>
          <button class="btn" onclick="closeModal()">닫기 (Esc)</button>
        </div>
      </div>
      <div class="modal-body">
        <div id="modalPreview" class="markdown-body"></div>
      </div>
    </div>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const resizer = document.getElementById('resizer');
    const editorContainer = document.getElementById('editorContainer');
    const themeToggle = document.getElementById('themeToggle');
    const hljsStyle = document.getElementById('hljs-style');

    // Drop behavior: false = 새로 쓰기(덮어쓰기), true = 이어붙이기
    let appendMode = false;
    const dropModeToggle = document.getElementById('dropModeToggle');

    /* ===== 이미지 토큰 저장소 =====
       본문에는 짧은 토큰(img:xxx)만 넣고, 실제 base64는 여기 + IndexedDB에 보관.
       렌더 시 토큰을 실제 이미지로 치환하고, 저장/복사 시에는 실제 base64로 되돌린다. */
    const imageStore = new Map(); // token -> { dataUrl, name }
    let imgCounter = 0;
    function makeToken() {
      imgCounter++;
      return 'img' + Date.now().toString(36) + imgCounter.toString(36);
    }
    function addImage(dataUrl, name) {
      const token = makeToken();
      const entry = { dataUrl, name: name || 'image' };
      imageStore.set(token, entry);
      if (dbManager.db) dbManager.setItem('images', token, entry).catch(() => {});
      return token;
    }
    // 렌더된 컨테이너 안의 img:토큰 src를 실제 이미지로 치환
    function resolveImages(container) {
      container.querySelectorAll('img').forEach(img => {
        const src = img.getAttribute('src') || '';
        if (src.startsWith('img:')) {
          const entry = imageStore.get(src.slice(4));
          if (entry) {
            img.src = entry.dataUrl;
          } else {
            // 누락된 토큰: 깨진 아이콘 대신 안내 박스
            const span = document.createElement('span');
            span.textContent = `🖼️ [이미지 없음: ${img.alt || src.slice(4)}]`;
            span.style.cssText = 'display:inline-block; padding:0.2rem 0.5rem; border:1px dashed var(--border); border-radius:6px; opacity:0.6; font-size:0.85em;';
            img.replaceWith(span);
          }
        }
      });
    }
    // 저장/복사용: 본문의 img:토큰을 실제 base64로 인라인 (자기완결형 .md)
    function inlineImages(md) {
      return md.replace(/\]\(img:([A-Za-z0-9]+)\)/g, (m, token) => {
        const entry = imageStore.get(token);
        return entry ? `](${entry.dataUrl})` : m;
      });
    }
    // 이미 본문에 박힌 긴 data: 이미지를 토큰으로 압축
    function compactInlineImages() {
      let count = 0;
      const newText = editor.value.replace(/!\[([^\]]*)\]\((data:[^)]+)\)/g, (m, alt, dataUrl) => {
        const token = addImage(dataUrl, alt);
        count++;
        return `![${alt}](img:${token})`;
      });
      if (count) {
        editor.value = newText;
        updatePreview();
        saveToDB();
        showToast(`이미지 ${count}개를 토큰으로 접었습니다.`, 'success');
      } else {
        showToast('접을 인라인 이미지(data:)가 없습니다.', 'info');
      }
    }

    function toggleDropMode() {
      appendMode = !appendMode;
      dropModeToggle.textContent = appendMode ? '📎 드롭: 이어붙이기' : '📄 드롭: 새로 쓰기';
      dropModeToggle.classList.toggle('btn-primary', appendMode);
    }

    /* ===== 다중 문서(탭) 관리 =====
       문서별로 { id, title, content, customTitle, updatedAt } 를 IndexedDB 'docs' 스토어에 보관.
       탭 순서/활성 문서는 'content' 스토어(doc_order, active_doc)에 기록.
       이미지 토큰 저장소(imageStore/'images')는 모든 문서가 공유한다. */
    let docs = [];          // 순서대로 정렬된 문서 배열
    let activeDocId = null;
    let docCounter = 0;
    function genDocId() { docCounter++; return 'd' + Date.now().toString(36) + docCounter.toString(36); }

    // 첫 줄(또는 첫 제목)에서 탭 이름 자동 생성
    function deriveTitle(content) {
      const firstLine = (content || '').split('\n').map(l => l.trim()).find(l => l) || '';
      let t = firstLine
        .replace(/^#{1,6}\s+/, '')                       // 헤더 마크 제거
        .replace(/!\[[^\]]*\]\([^)]*\)/g, '[이미지]')      // 이미지
        .replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')          // 링크 → 텍스트
        .replace(/[`*_~>#]+/g, ' ')                        // 잡 마크다운 기호
        .replace(/\s+/g, ' ')
        .trim();
      if (t.length > 30) t = t.slice(0, 30) + '…';
      return t || '제목 없음';
    }

    function getActiveDoc() { return docs.find(d => d.id === activeDocId) || null; }

    function persistDoc(doc) {
      if (dbManager.db) dbManager.setItem('docs', doc.id, doc).catch(() => {});
    }
    function persistMeta() {
      if (!dbManager.db) return;
      dbManager.setItem('content', 'doc_order', docs.map(d => d.id)).catch(() => {});
      dbManager.setItem('content', 'active_doc', activeDocId).catch(() => {});
    }

    function renderTabs() {
      const list = document.getElementById('docTabList');
      list.innerHTML = '';
      docs.forEach(d => {
        const tab = document.createElement('div');
        tab.className = 'doc-tab' + (d.id === activeDocId ? ' active' : '');
        tab.dataset.id = d.id;
        tab.title = d.title + '  (더블클릭: 이름 변경)';
        tab.onclick = () => switchDoc(d.id);
        tab.ondblclick = () => renameDoc(d.id);

        const title = document.createElement('span');
        title.className = 'doc-tab-title';
        title.textContent = d.title;
        tab.appendChild(title);

        const close = document.createElement('span');
        close.className = 'doc-tab-close';
        close.textContent = '✕';
        close.title = '문서 닫기';
        close.onclick = (e) => deleteDoc(d.id, e);
        tab.appendChild(close);

        list.appendChild(tab);
      });
      const activeTab = list.querySelector('.doc-tab.active');
      if (activeTab && activeTab.scrollIntoView) activeTab.scrollIntoView({ inline: 'nearest', block: 'nearest' });
    }

    function loadDoc(id) {
      const doc = docs.find(d => d.id === id);
      if (!doc) return;
      activeDocId = id;
      editor.value = doc.content;
      updatePreview();
      if (previewMode === 'text') updatePlain();
      renderTabs();
    }

    function switchDoc(id) {
      if (id === activeDocId) return;
      saveToDB();          // 현재 편집 내용 보존(메모리+DB)
      loadDoc(id);
      persistMeta();
    }

    function newDoc(initial) {
      saveToDB();          // 현재 문서 보존
      const content = (typeof initial === 'string') ? initial : '';
      const doc = { id: genDocId(), title: deriveTitle(content), content, customTitle: false, updatedAt: Date.now() };
      docs.push(doc);
      activeDocId = doc.id;
      editor.value = content;
      updatePreview();
      if (previewMode === 'text') updatePlain();
      renderTabs();
      persistDoc(doc);
      persistMeta();
      editor.focus();
      return doc;
    }

    function renameDoc(id) {
      const doc = docs.find(d => d.id === id);
      if (!doc) return;
      const name = prompt('문서 이름을 입력하세요 (비우면 자동 이름으로 복귀):', doc.title);
      if (name === null) return;
      const trimmed = name.trim();
      if (trimmed) { doc.customTitle = true; doc.title = trimmed; }
      else { doc.customTitle = false; doc.title = deriveTitle(doc.content); }
      doc.updatedAt = Date.now();
      renderTabs();
      persistDoc(doc);
    }

    function deleteDoc(id, e) {
      if (e) e.stopPropagation();
      const idx = docs.findIndex(d => d.id === id);
      if (idx === -1) return;
      const doc = docs[idx];
      if (!confirm(`'${doc.title}' 문서를 닫을까요? 되돌릴 수 없습니다.`)) return;
      if (id !== activeDocId) saveToDB();   // 활성 문서 편집분 보존
      docs.splice(idx, 1);
      if (dbManager.db) dbManager.removeItem('docs', id).catch(() => {});
      if (activeDocId === id) {
        if (docs.length === 0) {
          const blank = { id: genDocId(), title: '제목 없음', content: '', customTitle: false, updatedAt: Date.now() };
          docs.push(blank);
          persistDoc(blank);
          loadDoc(blank.id);
        } else {
          loadDoc(docs[Math.max(0, idx - 1)].id);
        }
      } else {
        renderTabs();
      }
      persistMeta();
      showToast('문서를 닫았습니다.', 'info');
    }

    // 'docs' 스토어 + 순서/활성 메타를 읽어 docs 배열 구성 (없으면 기존 단일 문서 이관)
    async function loadAllDocs() {
      const order = await dbManager.getItem('content', 'doc_order');
      const all = await dbManager.getAll('docs') || {};
      docs = [];
      if (Array.isArray(order) && order.length) {
        order.forEach(id => { if (all[id]) docs.push(all[id]); });
        Object.keys(all).forEach(id => { if (!order.includes(id)) docs.push(all[id]); });
      } else {
        Object.values(all).forEach(d => docs.push(d));
      }
      // 필드 정규화
      docs.forEach(d => {
        if (typeof d.customTitle !== 'boolean') d.customTitle = false;
        if (!d.title) d.title = deriveTitle(d.content);
      });

      if (docs.length === 0) {
        // 최초 실행이거나 구버전(단일 문서) 사용자 → 이관
        const legacy = await dbManager.getItem('content', 'last_content');
        const content = (legacy && legacy.trim()) ? legacy : initialContent;
        const doc = { id: genDocId(), title: deriveTitle(content), content, customTitle: false, updatedAt: Date.now() };
        docs.push(doc);
        persistDoc(doc);
      }

      const savedActive = await dbManager.getItem('content', 'active_doc');
      activeDocId = (savedActive && docs.some(d => d.id === savedActive)) ? savedActive : docs[0].id;
      loadDoc(activeDocId);
      persistMeta();
    }

    // Initial Content
    const initialContent = `# Markdown Viewer 가이드

이 도구는 실시간으로 마크다운을 렌더링합니다.

## 주요 기능
- **실시간 미리보기**: 입력하는 즉시 결과 확인
- **테마 전환**: 라이트/다크 모드 지원
- **파일 불러오기/저장**: Local MD 파일 편집 가능
- **복사 기능**: 마크다운 원문 또는 변환된 HTML 복사
- **반응형 디자인**: 화면 크기에 맞는 레이아웃

### 테스트용 문법
1. **Bold** & *Italic*
2. [Google](https://google.com) 링크
3. \`Inline Code\`

\`\`\`javascript
function hello() {
  console.log("Hello, Markdown!");
}
\`\`\`

> 인용구 테스트입니다.
`;

    // Theme Logic
    mdRenderer.init({
      onThemeChange: (mode) => {
        const isDark = mode === 'dark';
        themeToggle.textContent = isDark ? '☀️ 라이트 모드' : '🌙 다크 모드';
      }
    });

    // 포털 전역 테마와 연동 (에디터 본문 + 미리보기 동시 적용)
    portalTheme.onChange = (mode) => {
      document.body.classList.toggle('dark-mode', mode === 'dark');
      mdRenderer.applyTheme(mode);
    };
    portalTheme.onChange(portalTheme.get());

    function toggleTheme() {
      portalTheme.toggle();
    }

    function updatePreview() {
      const text = editor.value;
      preview.innerHTML = mdRenderer.render(text);
      resolveImages(preview);
    }

    // 클립보드 이미지 붙여넣기(Ctrl+V) → 토큰으로 삽입
    editor.addEventListener('paste', (e) => {
      const items = (e.clipboardData && e.clipboardData.items) || [];
      for (const item of items) {
        if (item.type && item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (!file) continue;
          e.preventDefault();
          const reader = new FileReader();
          reader.onload = (ev) => {
            const name = file.name && file.name !== 'image.png' ? file.name : `pasted-${Date.now()}.png`;
            const token = addImage(ev.target.result, name);
            fileDropHandler.insertAtCursor(editor, `\n![${name}](img:${token})\n`);
            showToast('붙여넣은 이미지를 첨부했습니다.', 'success');
          };
          reader.readAsDataURL(file);
          return;
        }
      }
    });

    /* --- 텍스트 추출 (마크다운 제거) --- */
    const plainOutput = document.getElementById('plainOutput');
    let previewMode = 'preview';

    // 인라인 마크다운(굵게/기울임/링크/이미지/코드 등)을 읽기 좋은 평문으로 변환
    function inlineToText(s) {
      if (!s) return '';
      let t = s;
      t = t.replace(/!\[([^\]]*)\]\([^)]*\)/g, (m, alt) => alt ? `[이미지: ${alt}]` : '[이미지]');
      t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, txt, url) => {
        const u = (url || '').trim();
        return (u && u !== txt) ? `${txt} (${u})` : txt;   // 링크는 '텍스트 (URL)' 형태로 보존
      });
      t = t.replace(/\*\*([^*]+)\*\*/g, '$1');             // **굵게**
      t = t.replace(/__([^_]+)__/g, '$1');
      t = t.replace(/\*([^*]+)\*/g, '$1');                 // *기울임*
      t = t.replace(/(^|[^\w])_([^_]+)_(?=[^\w]|$)/g, '$1$2'); // _기울임_ (단어 내부 _ 는 제외)
      t = t.replace(/~~([^~]+)~~/g, '$1');                 // ~~취소선~~
      t = t.replace(/`([^`]+)`/g, '$1');                   // `인라인 코드`
      t = t.replace(/<[^>]+>/g, '');                       // HTML 태그
      return t;
    }

    // 마크다운 전체를 가독성 있는 평문으로 변환 (표 → 리스트, 헤더 → 구분선 등)
    function markdownToText(md) {
      if (!md) return '';
      const lines = md.replace(/\r\n?/g, '\n').split('\n');
      const out = [];
      let i = 0;

      const isTableSep = (line) => line.includes('-') &&
        /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)*\|?\s*$/.test(line);
      const splitRow = (line) => line.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => c.trim());

      while (i < lines.length) {
        const line = lines[i];

        // 코드 블록(펜스): 내용은 그대로 보존
        const fence = line.match(/^\s*(```|~~~)/);
        if (fence) {
          const token = fence[1];
          const code = [];
          i++;
          while (i < lines.length && !lines[i].trim().startsWith(token)) { code.push(lines[i]); i++; }
          i++; // 닫는 펜스 건너뜀
          if (code.length) out.push(code.join('\n'));
          continue;
        }

        // 표: 헤더 + 구분선 패턴이면 행마다 'key: value' 리스트로 변환
        if (line.includes('|') && i + 1 < lines.length && isTableSep(lines[i + 1])) {
          const headers = splitRow(line);
          const hasHeader = headers.some(h => h);
          i += 2; // 헤더행 + 구분선
          while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
            const cells = splitRow(lines[i]);
            const rowText = hasHeader
              ? cells.map((c, idx) => headers[idx] ? `${inlineToText(headers[idx])}: ${inlineToText(c)}` : inlineToText(c)).join(' | ')
              : cells.map(inlineToText).join(' | ');
            out.push(`- ${rowText}`);
            i++;
          }
          continue;
        }

        // 헤더(ATX): H1/H2는 밑줄, H3+는 ▶ 표시
        const h = line.match(/^\s{0,3}(#{1,6})\s+(.+?)\s*#*\s*$/);
        if (h) {
          const level = h[1].length;
          const text = inlineToText(h[2]);
          out.push('');
          if (level <= 2) {
            out.push(text);
            out.push((level === 1 ? '═' : '─').repeat(Math.min(Math.max(text.length, 3), 40)));
          } else {
            out.push(`▶ ${text}`);
          }
          i++;
          continue;
        }

        // 수평선
        if (/^\s{0,3}([-*_])\s*(\1\s*){2,}$/.test(line)) { out.push('─'.repeat(40)); i++; continue; }

        // 인용구
        const q = line.match(/^\s*>\s?(.*)$/);
        if (q) { out.push(`│ ${inlineToText(q[1])}`); i++; continue; }

        // 불릿/번호 리스트 (들여쓰기 보존, 불릿은 • 로 통일)
        const ul = line.match(/^(\s*)[-*+]\s+(.+)$/);
        if (ul) { out.push(`${ul[1]}• ${inlineToText(ul[2])}`); i++; continue; }
        const ol = line.match(/^(\s*)(\d+)\.\s+(.+)$/);
        if (ol) { out.push(`${ol[1]}${ol[2]}. ${inlineToText(ol[3])}`); i++; continue; }

        // 일반 문단
        out.push(inlineToText(line));
        i++;
      }

      return out.join('\n').replace(/\n{3,}/g, '\n\n').trim();
    }

    function updatePlain() {
      const cleaned = markdownToText(editor.value);
      plainOutput.value = cleaned;
      const words = cleaned.trim() ? cleaned.trim().split(/\s+/).filter(Boolean).length : 0;
      const chars = cleaned.length;
      const noSpace = cleaned.replace(/\s/g, '').length;
      document.getElementById('textCounts').textContent = `단어 ${words} · 글자 ${chars} · 공백제외 ${noSpace}`;
    }

    function setPreviewMode(mode) {
      previewMode = mode;
      const isText = mode === 'text';
      document.getElementById('segPreview').classList.toggle('active', !isText);
      document.getElementById('segText').classList.toggle('active', isText);
      document.getElementById('textTools').style.display = isText ? 'flex' : 'none';
      preview.style.display = isText ? 'none' : 'block';
      plainOutput.style.display = isText ? 'block' : 'none';
      if (isText) updatePlain();
    }

    async function copyPlain() {
      if (!plainOutput.value) { showToast('추출할 텍스트가 없습니다.', 'warning'); return; }
      try {
        await navigator.clipboard.writeText(plainOutput.value);
        showToast('순수 텍스트를 복사했습니다.', 'success');
      } catch (e) {
        showToast('복사에 실패했습니다.', 'error');
      }
    }

    function downloadPlain() {
      if (!plainOutput.value) { showToast('다운로드할 텍스트가 없습니다.', 'warning'); return; }
      const blob = new Blob([plainOutput.value], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'extracted-text.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Debounce function to limit rendering frequency
    function debounce(func, timeout = 300) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => { func.apply(this, args); }, timeout);
      };
    }

    const debouncedUpdate = debounce(() => {
      updatePreview();
      if (previewMode === 'text') updatePlain();
      saveToDB();
    }, 300);

    editor.addEventListener('input', debouncedUpdate);

    // Persistence Logic
    async function initStorage() {
      try {
        await dbManager.init('MDViewerDB', ['content', 'images', 'docs']);
        // 저장된 이미지 토큰 복원
        const storedImgs = await dbManager.getAll('images');
        Object.entries(storedImgs || {}).forEach(([token, val]) => imageStore.set(token, val));
        // 문서 목록 로드 (없으면 기존 단일 문서 자동 이관) + 탭 렌더
        await loadAllDocs();

        // Initialize File Drop Handler
        fileDropHandler.init(editor, {
          onImage: (base64, file) => {
            const token = addImage(base64, file.name);
            fileDropHandler.insertAtCursor(editor, `\n![${file.name}](img:${token})\n`);
            showToast(`이미지 '${file.name}'가 첨부되었습니다.`, 'success');
          },
          onText: (content, file) => {
            if (appendMode) {
              // 이어붙이기: 기존 내용 끝에 구분선과 함께 추가
              const prefix = editor.value.trim() ? `${editor.value.replace(/\s+$/, '')}\n\n--- [Dropped: ${file.name}] ---\n\n` : '';
              editor.value = prefix + content;
              showToast(`파일 '${file.name}'의 내용이 이어붙여졌습니다.`, 'success');
            } else {
              // 새로 쓰기: 기존 내용을 덮어씀
              editor.value = content;
              showToast(`파일 '${file.name}'의 내용을 불러왔습니다.`, 'success');
            }
            updatePreview();
            saveToDB();
          }
        });
      } catch (err) {
        console.error('Failed to init DB:', err);
        // DB 실패 시에도 인메모리 문서 1개로 동작 (영속만 안 됨)
        if (docs.length === 0) {
          docs.push({ id: genDocId(), title: deriveTitle(initialContent), content: initialContent, customTitle: false, updatedAt: Date.now() });
        }
        activeDocId = docs[0].id;
        loadDoc(activeDocId);
      }
    }

    function saveToDB() {
      const doc = getActiveDoc();
      if (!doc) return;
      const prevTitle = doc.title;
      doc.content = editor.value;
      if (!doc.customTitle) doc.title = deriveTitle(doc.content);
      doc.updatedAt = Date.now();
      persistDoc(doc);
      if (doc.title !== prevTitle) renderTabs();  // 자동 제목이 바뀌면 탭 갱신
    }

    // Initialize on load
    window.addEventListener('load', initStorage);

    // File Operations
    function loadFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        // 기존 문서를 덮어쓰지 않고 새 탭으로 연다
        const doc = newDoc(e.target.result);
        const base = (file.name || '문서').replace(/\.[^.]+$/, '');
        if (base) { doc.title = base; doc.customTitle = true; }
        doc.updatedAt = Date.now();
        persistDoc(doc);
        renderTabs();
        showToast(`'${file.name}'을(를) 새 탭으로 열었습니다.`, 'success');
      };
      reader.readAsText(file);
      event.target.value = '';   // 같은 파일을 다시 열 수 있도록 초기화
    }

    function saveFile() {
      const doc = getActiveDoc();
      const base = (doc && doc.title && doc.title !== '제목 없음') ? doc.title : 'document';
      const safe = base.replace(/[\\/:*?"<>|]/g, '_').replace(/\s+/g, ' ').trim().slice(0, 60) || 'document';
      const blob = new Blob([inlineImages(editor.value)], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = safe + '.md';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Copy Functions
    async function copyMarkdown() {
      try {
        await navigator.clipboard.writeText(inlineImages(editor.value));
        showToast('마크다운 원문이 복사되었습니다. (이미지 포함)', 'success');
      } catch (err) {
        showToast('복사에 실패했습니다.', 'error');
      }
    }

    async function copyHTML() {
      try {
        const html = preview.innerHTML;
        // Wrap in a div with markdown-body class to help some targets recognize styles if they support it
        // and to provide a consistent root.
        const wrappedHTML = `<div class="markdown-body">${html}</div>`;
        
        const blob = new Blob([wrappedHTML], { type: 'text/html' });
        const textBlob = new Blob([html], { type: 'text/plain' });
        
        const data = [new ClipboardItem({
          'text/html': blob,
          'text/plain': textBlob
        })];
        
        await navigator.clipboard.write(data);
        showToast('서식이 포함된 HTML로 복사되었습니다. (워드/메일 등에 붙여넣기 가능)', 'success');
      } catch (err) {
        console.error('Rich copy failed:', err);
        // Fallback to plain text copy
        try {
          await navigator.clipboard.writeText(preview.innerHTML);
          showToast('HTML 코드가 일반 텍스트로 복사되었습니다.', 'info');
        } catch (fallbackErr) {
          showToast('복사에 실패했습니다.', 'error');
        }
      }
    }

    function clearAll() {
      // 현재 문서의 내용만 비운다 (다른 탭/공유 이미지는 보존)
      if (confirm('현재 문서의 내용을 비우시겠습니까?')) {
        editor.value = '';
        updatePreview();
        saveToDB();
        editor.focus();
      }
    }

    // Resizer Logic
    let isResizing = false;

    resizer.addEventListener('mousedown', (e) => {
      isResizing = true;
      resizer.classList.add('active');
      document.body.classList.add('resizing');
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      
      const containerWidth = document.body.clientWidth;
      const newWidth = (e.clientX / containerWidth) * 100;
      
      if (newWidth > 10 && newWidth < 90) {
        editorContainer.style.width = `${newWidth}%`;
      }
    });

    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        resizer.classList.remove('active');
        document.body.classList.remove('resizing');
      }
    });

    // Modal Control
    function openModal() {
      const modal = document.getElementById('previewModal');
      const modalPreview = document.getElementById('modalPreview');
      modalPreview.innerHTML = preview.innerHTML; // 미리보기는 이미 실제 이미지로 치환된 상태
      modal.style.display = 'block';
      document.body.style.overflow = 'hidden'; // Prevent scrolling background
    }

    function closeModal() {
      document.getElementById('previewModal').style.display = 'none';
      document.body.style.overflow = '';
    }

    function printMarkdown() {
      const currentTheme = mdRenderer.theme;
      const isDark = currentTheme === 'dark';
      
      // Force light theme for printing to ensure best quality/ink usage
      if (isDark) {
        mdRenderer.applyTheme('light');
      }
      
      window.print();
      
      // Restore previous theme after print dialog closes
      if (isDark) {
        setTimeout(() => {
          mdRenderer.applyTheme('dark');
        }, 100);
      }
    }

    // Close modal on Esc key or clicking outside
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
      
      // Smart Ctrl+A (or Cmd+A) inside modal
      const modal = document.getElementById('previewModal');
      if (modal.style.display === 'block' && (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a') {
        e.preventDefault(); // Stop default "select all page"
        const range = document.createRange();
        range.selectNodeContents(document.getElementById('modalPreview'));
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      }
    });

    window.addEventListener('click', (e) => {
      const modal = document.getElementById('previewModal');
      if (e.target === modal) closeModal();
    });
  </script>
</body>
