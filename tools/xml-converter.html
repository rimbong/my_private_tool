<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XML Converter Pro</title>
  <style>
    :root {
      --background-color: #f3f4f6;
      --text-color: #111827;
      --card-background-color: #ffffff;
      --border-color: #d1d5db;
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --secondary-color: #4b5563;
      --secondary-hover: #374151;
    }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      margin: 0;
      background-color: var(--background-color);
      color: var(--text-color);
      padding: 2rem;
      display: flex;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 1000px;
    }
    .card {
      background-color: var(--card-background-color);
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary-color); }
    .input-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.875rem; }
    textarea {
      width: 100%;
      min-height: 250px;
      padding: 1rem;
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.875rem;
      resize: vertical;
      box-sizing: border-box;
    }
    .button-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.75rem;
      margin: 1rem 0;
    }
    button {
      padding: 0.75rem 1rem;
      border-radius: 0.375rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background-color: var(--primary-color); color: white; }
    .btn-primary:hover { background-color: var(--primary-hover); }
    .btn-secondary { background-color: var(--secondary-color); color: white; }
    .btn-secondary:hover { background-color: var(--secondary-hover); }
    
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .copy-status { font-size: 0.875rem; color: #059669; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>XML Converter Pro</h1>
      
      <div class="input-group">
        <label for="inputXml">Input (XML or Escaped XML)</label>
        <textarea id="inputXml" placeholder="여기에 XML 또는 이스케이프된 문자열을 입력하세요..."></textarea>
      </div>

      <div class="button-group">
        <button id="btnUnescape" class="btn-primary">Unescape & Clean</button>
        <button id="btnEscape" class="btn-secondary">Escape XML</button>
        <button id="btnPretty" class="btn-secondary">Pretty Print</button>
      </div>

      <div class="result-header">
        <label>Result</label>
        <button id="btnCopy" style="width: auto; padding: 0.4rem 0.8rem; font-size: 0.75rem;" class="btn-primary">Copy Result</button>
      </div>
      <textarea id="convertedXml" readonly placeholder="변환된 결과가 여기에 표시됩니다..."></textarea>
      <span id="copyAlert" style="display:none;"></span>
    </div>
  </div>

  <script src="./shared-utils.js"></script>
  <script>
    /**
     * XML을 HTML 엔티티로 변환 (Escape)
     */
    function escapeHTML(str) {
      if (str == null) return "";
      const ENTITIES = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      };
      return str.replace(/[&<>"']/g, m => ENTITIES[m]);
    }

    /**
     * XML 정렬 (Pretty Print)
     */
    function formatXml(xml) {
      let formatted = '';
      let reg = /(>)(<)(\/*)/g;
      xml = xml.replace(reg, '$1\r\n$2$3');
      let pad = 0;
      xml.split('\r\n').forEach(function(node) {
        let indent = 0;
        if (node.match(/.+<\/\w[^>]*>$/)) {
          indent = 0;
        } else if (node.match(/^<\/\w/)) {
          if (pad != 0) pad -= 1;
        } else if (node.match(/^<\w[^>]*[^\/]>.*$/)) {
          indent = 1;
        } else {
          indent = 0;
        }

        let padding = '';
        for (let i = 0; i < pad; i++) {
          padding += '  ';
        }

        formatted += padding + node + '\r\n';
        pad += indent;
      });
      return formatted.trim();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const inputEl = document.getElementById('inputXml');
      const outputEl = document.getElementById('convertedXml');
      const copyAlertEl = document.getElementById('copyAlert');

      // Unescape & Clean
      document.getElementById('btnUnescape').addEventListener('click', () => {
        let val = unescapeHTML(inputEl.value);
        val = removeCRLFStr(val);
        outputEl.value = val;
      });

      // Escape XML
      document.getElementById('btnEscape').addEventListener('click', () => {
        outputEl.value = escapeHTML(inputEl.value);
      });

      // Pretty Print
      document.getElementById('btnPretty').addEventListener('click', () => {
        try {
          if (!inputEl.value) return;
          outputEl.value = formatXml(inputEl.value);
        } catch (e) {
          alert('XML 형식이 올바르지 않습니다.');
        }
      });

      // Copy
      document.getElementById('btnCopy').addEventListener('click', async () => {
        if (!outputEl.value) return;
        await copyAndAlert(outputEl.value, copyAlertEl);
      });
    });
  </script>
</body>
</html>
