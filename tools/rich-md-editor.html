<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노트 편집기 (위지윅)</title>
  <script src="lib/tiptap.bundle.js"></script>
  <script src="lib/toast-utils.js"></script>
  <script src="lib/modal-utils.js"></script>
  <script src="lib/db-manager.js"></script>
  <script src="lib/portal-theme.js"></script>
  <style>
    :root {
      --bg: #ffffff; --panel: #f9fafb; --panel2: #f3f4f6; --text: #111827; --muted: #6b7280;
      --border: #e5e7eb; --primary: #2563eb; --primary-soft: #eff6ff; --danger: #dc2626;
      --code-bg: #f3f4f6; --sel: #b3d4fc;
    }
    body.dark {
      --bg: #0d1117; --panel: #161b22; --panel2: #1c2128; --text: #c9d1d9; --muted: #8b949e;
      --border: #30363d; --primary: #58a6ff; --primary-soft: #16304f; --danger: #f85149;
      --code-bg: #161b22; --sel: #1f4b78;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Pretendard", sans-serif;
      background: var(--bg); color: var(--text); display: flex; flex-direction: column;
      transition: background 0.2s, color 0.2s;
    }
    /* ===== 툴바 ===== */
    .toolbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.25rem;
      padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border);
      background: var(--panel); flex-shrink: 0;
    }
    .tb-group { display: inline-flex; align-items: center; gap: 0.15rem; }
    .tb-sep { width: 1px; align-self: stretch; background: var(--border); margin: 0.15rem 0.35rem; }
    .tb-btn {
      min-width: 30px; height: 30px; padding: 0 0.45rem; border: 1px solid transparent;
      background: transparent; color: var(--text); border-radius: 6px; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.12s, border-color 0.12s;
    }
    .tb-btn:hover { background: var(--code-bg); }
    .tb-btn.active { background: var(--primary-soft); color: var(--primary); border-color: var(--primary); }
    .tb-spacer { flex: 1; }
    .tb-btn.wide { padding: 0 0.7rem; font-size: 0.8rem; }
    .save-state { font-size: 0.75rem; color: var(--muted); white-space: nowrap; margin-right: 0.3rem; }
    /* ===== 본문 3열 ===== */
    .body { flex: 1; display: flex; min-height: 0; }
    /* 노트 목록 사이드바 */
    .sidebar {
      width: 250px; flex-shrink: 0; border-right: 1px solid var(--border); background: var(--panel);
      display: flex; flex-direction: column; min-height: 0; transition: width 0.18s ease;
    }
    body.side-collapsed .sidebar { width: 0; border-right: none; overflow: hidden; }
    .side-head { padding: 0.6rem 0.7rem; display: flex; align-items: center; gap: 0.4rem; border-bottom: 1px solid var(--border); }
    .side-head .title { font-size: 0.8rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .side-head .count { font-size: 0.72rem; color: var(--muted); }
    .new-btn {
      margin-left: auto; padding: 0.3rem 0.6rem; border: 1px solid var(--primary); background: var(--primary);
      color: #fff; border-radius: 6px; cursor: pointer; font-size: 0.78rem; font-weight: 700; white-space: nowrap;
    }
    .new-btn:hover { filter: brightness(1.08); }
    .side-search { padding: 0.5rem 0.7rem; border-bottom: 1px solid var(--border); }
    .side-search input {
      width: 100%; padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); color: var(--text); font-size: 0.82rem; outline: none;
    }
    .side-search input:focus { border-color: var(--primary); }
    .note-list { flex: 1; overflow-y: auto; padding: 0.4rem; }
    .note-item {
      padding: 0.5rem 0.6rem; border-radius: 8px; cursor: pointer; margin-bottom: 0.25rem;
      border: 1px solid transparent; position: relative;
    }
    .note-item:hover { background: var(--panel2); }
    .note-item.active { background: var(--primary-soft); border-color: var(--primary); }
    .note-item .n-title { font-size: 0.86rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 1.2rem; }
    .note-item .n-meta { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item .n-del {
      position: absolute; top: 0.35rem; right: 0.35rem; width: 22px; height: 22px; border: none;
      background: transparent; color: var(--muted); cursor: pointer; border-radius: 5px; font-size: 0.85rem;
      opacity: 0; transition: opacity 0.12s;
    }
    .note-item:hover .n-del { opacity: 0.75; }
    .note-item .n-del:hover { opacity: 1; background: #fee2e2; color: var(--danger); }
    body.dark .note-item .n-del:hover { background: #3b1d1d; }
    .side-empty { padding: 2rem 1rem; text-align: center; color: var(--muted); font-size: 0.82rem; line-height: 1.6; }
    /* 편집 영역 */
    .editor-area { flex: 1; display: flex; min-width: 0; }
    .editor-scroll { flex: 1; overflow: auto; display: flex; justify-content: center; }
    .ProseMirror {
      width: 100%; max-width: 820px; padding: 2rem 1.5rem 6rem; outline: none; line-height: 1.7; font-size: 1rem;
    }
    .ProseMirror:focus { outline: none; }
    .ProseMirror > * + * { margin-top: 0.75em; }
    .ProseMirror h1 { font-size: 1.9rem; font-weight: 800; margin: 1.2em 0 0.4em; }
    .ProseMirror h2 { font-size: 1.5rem; font-weight: 800; margin: 1.1em 0 0.4em; }
    .ProseMirror h3 { font-size: 1.25rem; font-weight: 700; margin: 1em 0 0.3em; }
    .ProseMirror h4 { font-size: 1.05rem; font-weight: 700; }
    .ProseMirror p { margin: 0; }
    .ProseMirror ul, .ProseMirror ol { padding-left: 1.4rem; }
    .ProseMirror ul[data-type="taskList"] { list-style: none; padding-left: 0.3rem; }
    .ProseMirror ul[data-type="taskList"] li { display: flex; gap: 0.5rem; align-items: flex-start; }
    .ProseMirror ul[data-type="taskList"] li > label { margin-top: 0.25rem; }
    .ProseMirror blockquote { border-left: 3px solid var(--border); margin: 0; padding-left: 1rem; color: var(--muted); }
    .ProseMirror code {
      background: var(--code-bg); padding: 0.15em 0.35em; border-radius: 4px;
      font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 0.9em;
    }
    .ProseMirror pre {
      background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.9rem 1rem; overflow-x: auto; font-family: 'Fira Code', Consolas, monospace; font-size: 0.88rem;
    }
    .ProseMirror pre code { background: none; padding: 0; }
    .ProseMirror hr { border: none; border-top: 2px solid var(--border); margin: 1.5em 0; }
    .ProseMirror a { color: var(--primary); text-decoration: underline; }
    .ProseMirror mark { background: #fde68a; color: inherit; padding: 0 0.1em; border-radius: 2px; }
    .ProseMirror img { max-width: 100%; border-radius: 6px; }
    .ProseMirror table { border-collapse: collapse; width: 100%; margin: 0.5em 0; table-layout: fixed; overflow: hidden; }
    .ProseMirror th, .ProseMirror td { border: 1px solid var(--border); padding: 0.4rem 0.6rem; text-align: left; position: relative; }
    .ProseMirror th { background: var(--panel); font-weight: 700; }
    /* 드래그로 다중 선택된 셀 하이라이트 (병합 전 어떤 셀이 선택됐는지 인지) */
    .ProseMirror .selectedCell::after {
      content: ""; position: absolute; inset: 0; background: rgba(37, 99, 235, 0.30);
      pointer-events: none; z-index: 2;
    }
    body.dark .ProseMirror .selectedCell::after { background: rgba(88, 166, 255, 0.40); }
    /* 열 너비 조절 핸들 (마우스 올리면 파란 세로선) */
    .ProseMirror .column-resize-handle {
      position: absolute; right: -2px; top: 0; bottom: -2px; width: 4px;
      background: var(--primary); pointer-events: none; z-index: 3;
    }
    .ProseMirror.resize-cursor { cursor: col-resize; }
    .ProseMirror ::selection { background: var(--sel); }
    /* Placeholder(빈 문단 안내) */
    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder); color: var(--muted); float: left; height: 0; pointer-events: none;
    }
    /* 파일 열기/저장 액션 버튼 (아이콘 버튼과 달리 테두리·배경으로 '버튼'답게) */
    .tb-action {
      height: 30px; padding: 0 0.75rem; border: 1px solid var(--border); background: var(--bg);
      color: var(--text); border-radius: 7px; cursor: pointer; font-size: 0.8rem; font-weight: 700;
      display: inline-flex; align-items: center; gap: 0.35rem; white-space: nowrap;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .tb-action:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-soft); }
    /* MD 붙여넣기 다이얼로그 */
    .mdimp-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none;
      align-items: center; justify-content: center; z-index: 100;
    }
    .mdimp-overlay.open { display: flex; }
    .mdimp-box {
      background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 12px;
      width: min(680px, 92vw); max-height: 82vh; display: flex; flex-direction: column;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3); overflow: hidden;
    }
    .mdimp-head { padding: 0.9rem 1.1rem; font-weight: 800; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 0.6rem; }
    .mdimp-head span { font-size: 0.78rem; font-weight: 500; color: var(--muted); }
    .mdimp-box textarea {
      flex: 1; min-height: 320px; border: none; outline: none; resize: none; padding: 1rem 1.1rem;
      background: transparent; color: var(--text); font-family: 'Fira Code', Consolas, monospace; font-size: 0.9rem; line-height: 1.6;
    }
    .mdimp-box.drag { outline: 2px dashed var(--primary); outline-offset: -6px; }
    .mdimp-box.drag textarea { background: var(--primary-soft); }
    .mdimp-actions { padding: 0.75rem 1.1rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 0.5rem; }
    .dlg-btn {
      padding: 0.5rem 1rem; border: 1px solid var(--border); background: var(--bg); color: var(--text);
      border-radius: 7px; cursor: pointer; font-weight: 700; font-size: 0.85rem;
    }
    .dlg-btn:hover { border-color: var(--primary); color: var(--primary); }
    .dlg-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    /* 컨텍스트 툴바(표/코드) */
    .ctxbar { display: none; align-items: center; gap: 0.5rem; padding: 0.35rem 0.75rem; border-bottom: 1px solid var(--border); background: var(--panel2); flex-shrink: 0; }
    .ctxbar.show { display: flex; }
    .ctx-group { display: none; align-items: center; gap: 0.2rem; }
    .ctx-group.active { display: inline-flex; }
    .ctx-label { font-size: 0.75rem; font-weight: 800; color: var(--muted); margin-right: 0.3rem; }
    .tb-btn.danger:hover { background: #fee2e2; color: var(--danger); border-color: var(--danger); }
    body.dark .tb-btn.danger:hover { background: #3b1d1d; }
    #codeLang { padding: 0.3rem 0.5rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.8rem; font-weight: 600; }
    /* 코드 구문 강조(highlight.js 토큰) — 라이트/다크 겸용 */
    .ProseMirror pre code .hljs-comment, .ProseMirror pre code .hljs-quote { color: #6a737d; font-style: italic; }
    .ProseMirror pre code .hljs-keyword, .ProseMirror pre code .hljs-selector-tag, .ProseMirror pre code .hljs-literal, .ProseMirror pre code .hljs-type { color: #d73a49; }
    .ProseMirror pre code .hljs-string, .ProseMirror pre code .hljs-attr, .ProseMirror pre code .hljs-regexp, .ProseMirror pre code .hljs-addition { color: #032f62; }
    .ProseMirror pre code .hljs-number, .ProseMirror pre code .hljs-built_in, .ProseMirror pre code .hljs-symbol { color: #005cc5; }
    .ProseMirror pre code .hljs-title, .ProseMirror pre code .hljs-section, .ProseMirror pre code .hljs-name { color: #6f42c1; }
    .ProseMirror pre code .hljs-attribute, .ProseMirror pre code .hljs-variable, .ProseMirror pre code .hljs-template-variable { color: #e36209; }
    .ProseMirror pre code .hljs-meta, .ProseMirror pre code .hljs-deletion { color: #b31d28; }
    body.dark .ProseMirror pre code .hljs-comment, body.dark .ProseMirror pre code .hljs-quote { color: #8b949e; }
    body.dark .ProseMirror pre code .hljs-keyword, body.dark .ProseMirror pre code .hljs-selector-tag, body.dark .ProseMirror pre code .hljs-literal, body.dark .ProseMirror pre code .hljs-type { color: #ff7b72; }
    body.dark .ProseMirror pre code .hljs-string, body.dark .ProseMirror pre code .hljs-attr, body.dark .ProseMirror pre code .hljs-regexp, body.dark .ProseMirror pre code .hljs-addition { color: #a5d6ff; }
    body.dark .ProseMirror pre code .hljs-number, body.dark .ProseMirror pre code .hljs-built_in, body.dark .ProseMirror pre code .hljs-symbol { color: #79c0ff; }
    body.dark .ProseMirror pre code .hljs-title, body.dark .ProseMirror pre code .hljs-section, body.dark .ProseMirror pre code .hljs-name { color: #d2a8ff; }
    body.dark .ProseMirror pre code .hljs-attribute, body.dark .ProseMirror pre code .hljs-variable, body.dark .ProseMirror pre code .hljs-template-variable { color: #ffa657; }
    @media (max-width: 820px) {
      .sidebar { position: absolute; z-index: 40; height: 100%; box-shadow: 2px 0 12px rgba(0,0,0,0.15); }
    }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <div class="tb-group">
      <button class="tb-btn" data-act="toggleSide" title="노트 목록 접기/펴기">☰</button>
      <button class="tb-btn" data-act="undo" title="실행 취소">↶</button>
      <button class="tb-btn" data-act="redo" title="다시 실행">↷</button>
    </div>
    <span class="tb-sep"></span>
    <div class="tb-group">
      <button class="tb-btn" data-act="h1" data-active="heading:1" title="제목 1">H1</button>
      <button class="tb-btn" data-act="h2" data-active="heading:2" title="제목 2">H2</button>
      <button class="tb-btn" data-act="h3" data-active="heading:3" title="제목 3">H3</button>
    </div>
    <span class="tb-sep"></span>
    <div class="tb-group">
      <button class="tb-btn" data-act="bold" data-active="bold" title="굵게"><b>B</b></button>
      <button class="tb-btn" data-act="italic" data-active="italic" title="기울임"><i>I</i></button>
      <button class="tb-btn" data-act="strike" data-active="strike" title="취소선"><s>S</s></button>
      <button class="tb-btn" data-act="code" data-active="code" title="인라인 코드">&lt;/&gt;</button>
      <button class="tb-btn" data-act="highlight" data-active="highlight" title="하이라이트">🖍</button>
    </div>
    <span class="tb-sep"></span>
    <div class="tb-group">
      <button class="tb-btn" data-act="bulletList" data-active="bulletList" title="글머리 목록">•</button>
      <button class="tb-btn" data-act="orderedList" data-active="orderedList" title="번호 목록">1.</button>
      <button class="tb-btn" data-act="taskList" data-active="taskList" title="체크리스트">☑</button>
      <button class="tb-btn" data-act="blockquote" data-active="blockquote" title="인용">❝</button>
      <button class="tb-btn" data-act="codeBlock" data-active="codeBlock" title="코드 블록">{ }</button>
      <button class="tb-btn" data-act="hr" title="구분선">―</button>
    </div>
    <span class="tb-sep"></span>
    <div class="tb-group">
      <button class="tb-btn" data-act="link" data-active="link" title="링크">🔗</button>
      <button class="tb-btn" data-act="table" title="표 삽입">▦</button>
      <button class="tb-btn" data-act="image" title="이미지(URL)">🖼</button>
    </div>
    <span class="tb-sep"></span>
    <div class="tb-group">
      <button class="tb-btn" data-act="alignLeft" title="왼쪽 정렬">⟸</button>
      <button class="tb-btn" data-act="alignCenter" title="가운데 정렬">⟺</button>
      <button class="tb-btn" data-act="alignRight" title="오른쪽 정렬">⟹</button>
    </div>
    <span class="tb-spacer"></span>
    <span class="save-state" id="saveState"></span>
    <div class="tb-group">
      <button class="tb-action" id="btnImport" title="마크다운 텍스트를 붙여넣어 적용">📥 MD 붙여넣기</button>
      <button class="tb-action" id="btnOpen" title="마크다운(.md) 파일을 새 노트로 열기">📂 열기</button>
      <button class="tb-action" id="btnSave" title="현재 노트를 마크다운(.md) 파일로 저장">💾 저장</button>
      <input type="file" id="mdFile" accept=".md,.markdown,text/markdown" style="display:none;">
      <button class="tb-btn" onclick="portalTheme.toggle()" title="다크/라이트">🌙</button>
    </div>
  </div>

  <!-- 컨텍스트 툴바: 표/코드블록 안에 커서가 있을 때만 표시 -->
  <div class="ctxbar" id="ctxbar">
    <div class="ctx-group" id="ctxTable">
      <span class="ctx-label">행</span>
      <button class="tb-btn wide" data-tbl="addRowBefore" title="현재 행 위에 새 행 추가">＋위</button>
      <button class="tb-btn wide" data-tbl="addRowAfter" title="현재 행 아래에 새 행 추가">＋아래</button>
      <button class="tb-btn wide" data-tbl="deleteRow" title="현재 행 삭제">삭제</button>
      <span class="tb-sep"></span>
      <span class="ctx-label">열</span>
      <button class="tb-btn wide" data-tbl="addColumnBefore" title="현재 열 왼쪽에 새 열 추가">＋왼쪽</button>
      <button class="tb-btn wide" data-tbl="addColumnAfter" title="현재 열 오른쪽에 새 열 추가">＋오른쪽</button>
      <button class="tb-btn wide" data-tbl="deleteColumn" title="현재 열 삭제">삭제</button>
      <span class="tb-sep"></span>
      <button class="tb-btn wide" data-tbl="toggleHeaderRow" title="첫 행을 헤더로/일반으로 전환">헤더행</button>
      <button class="tb-btn wide" data-tbl="mergeOrSplit" title="선택한 셀 병합 / 병합된 셀 분할">셀 병합</button>
      <button class="tb-btn wide danger" data-tbl="deleteTable" title="표 전체 삭제">표 삭제</button>
    </div>
    <div class="ctx-group" id="ctxCode">
      <span class="ctx-label">코드 언어</span>
      <select id="codeLang" title="코드블록 언어(구문 강조)"></select>
    </div>
  </div>

  <div class="body">
    <aside class="sidebar">
      <div class="side-head">
        <span class="title">노트</span>
        <span class="count" id="noteCount"></span>
        <button class="new-btn" id="newNote">+ 새 노트</button>
      </div>
      <div class="side-search"><input type="text" id="noteSearch" placeholder="🔎 노트 검색..." autocomplete="off"></div>
      <div class="note-list" id="noteList"></div>
    </aside>

    <div class="editor-area">
      <div class="editor-scroll"><div id="editor"></div></div>
    </div>
  </div>

  <div class="mdimp-overlay" id="mdImpOverlay">
    <div class="mdimp-box">
      <div class="mdimp-head">📥 마크다운 붙여넣기 <span>여기에 붙여넣고 아래에서 적용하세요 (Esc 로 닫기)</span></div>
      <textarea id="mdImpArea" spellcheck="false" placeholder="# 제목&#10;&#10;마크다운을 여기에 붙여넣으세요…"></textarea>
      <div class="mdimp-actions">
        <button class="dlg-btn" id="mdImpCancel">취소</button>
        <button class="dlg-btn" id="mdImpNew">새 노트로 추가</button>
        <button class="dlg-btn primary" id="mdImpApply">현재 노트에 적용</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const TT = window.TT;
      const DB_NAME = 'note-editor-db';
      const STORE_NOTES = 'notes';
      const STORE_STATE = 'state';
      const LEGACY_LS_KEY = 'rich-md-editor-content';

      // ===== 상태 =====
      let notes = [];          // { id, title, content, updatedAt }
      let activeId = null;
      let loadingNote = false;  // 프로그램적 콘텐츠 교체 중엔 자동저장 스킵
      let saveTimer = null;

      // ===== 에디터 =====
      const editor = new TT.Editor({
        element: document.getElementById('editor'),
        extensions: [
          TT.StarterKit.configure({ codeBlock: false }),   // 기본 코드블록 끄고 아래 강조형으로 교체
          TT.CodeBlockLowlight.configure({ lowlight: TT.lowlight }),
          TT.Markdown,
          TT.Highlight,
          TT.TaskList,
          TT.TaskItem.configure({ nested: true }),
          TT.Table.configure({ resizable: true }),
          TT.TableRow,
          TT.TableHeader,
          TT.TableCell,
          TT.Image,
          TT.TextAlign.configure({ types: ['heading', 'paragraph'] }),
          TT.Placeholder.configure({ placeholder: '여기에 입력하세요. 첫 줄이 노트 제목이 됩니다…' })
        ],
        content: '',
        autofocus: true
      });

      function getMd() {
        return typeof editor.getMarkdown === 'function' ? editor.getMarkdown() : '';
      }
      function setMd(md) {
        loadingNote = true;
        editor.commands.setContent(md || '', { contentType: 'markdown' });
        loadingNote = false;
      }

      // ===== 유틸 =====
      function genId() {
        return 'note-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      }
      function deriveTitle(md) {
        const line = (md || '').split('\n').map(s => s.trim()).find(s => s.length > 0) || '';
        const clean = line.replace(/^#{1,6}\s+/, '').replace(/[*_`~>#-]/g, '').trim();
        return clean.slice(0, 60) || '제목 없음';
      }
      function preview(md) {
        const body = (md || '').split('\n').map(s => s.trim()).filter(Boolean);
        body.shift();   // 제목 줄 제외
        return (body.join(' ') || '내용 없음').replace(/[#*_`~>-]/g, '').trim().slice(0, 50);
      }
      function timeAgo(ts) {
        const d = Math.floor((Date.now() - ts) / 1000);
        if (d < 60) {
          return '방금';
        }
        if (d < 3600) {
          return Math.floor(d / 60) + '분 전';
        }
        if (d < 86400) {
          return Math.floor(d / 3600) + '시간 전';
        }
        return new Date(ts).toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' });
      }
      function esc(s) {
        return String(s).replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]));
      }

      function setSaveState(txt) {
        document.getElementById('saveState').textContent = txt;
      }

      // ===== dbManager 저장 =====
      async function persistNote(note) {
        if (!dbManager.db) {
          return;
        }
        try {
          await dbManager.setItem(STORE_NOTES, note.id, note);
        } catch (e) {
          showToast('저장에 실패했습니다 (저장 공간 초과 등).', 'error', 5000);
          setSaveState('저장 실패');
          throw e;
        }
      }
      function persistActiveId() {
        if (dbManager.db) {
          dbManager.setItem(STORE_STATE, 'activeId', activeId).catch(() => {});
        }
      }

      // ===== 노트 목록 렌더 =====
      const noteListEl = document.getElementById('noteList');
      const noteSearchEl = document.getElementById('noteSearch');
      function renderList() {
        const term = noteSearchEl.value.trim().toLowerCase();
        const sorted = notes.slice().sort((a, b) => b.updatedAt - a.updatedAt);
        const shown = term
          ? sorted.filter(n => (n.title + ' ' + n.content).toLowerCase().includes(term))
          : sorted;
        document.getElementById('noteCount').textContent = notes.length ? '(' + notes.length + ')' : '';
        if (shown.length === 0) {
          noteListEl.innerHTML = '<div class="side-empty">' + (term ? '검색 결과가 없습니다.' : '노트가 없습니다.<br>‘+ 새 노트’로 시작하세요.') + '</div>';
          return;
        }
        noteListEl.innerHTML = shown.map(n => (
          '<div class="note-item' + (n.id === activeId ? ' active' : '') + '" data-id="' + n.id + '">' +
            '<div class="n-title">' + esc(n.title || '제목 없음') + '</div>' +
            '<div class="n-meta">' + timeAgo(n.updatedAt) + ' · ' + esc(preview(n.content)) + '</div>' +
            '<button class="n-del" data-del="' + n.id + '" title="삭제">🗑</button>' +
          '</div>'
        )).join('');
      }

      // ===== 노트 조작 =====
      function findNote(id) {
        return notes.find(n => n.id === id);
      }
      async function openNote(id, opts) {
        const note = findNote(id);
        if (!note) {
          return;
        }
        activeId = id;
        setMd(note.content);
        persistActiveId();
        renderList();
        setSaveState('저장됨');
        if (!opts || opts.focus !== false) {
          editor.commands.focus('end');
        }
      }
      async function newNote() {
        const note = { id: genId(), title: '제목 없음', content: '', updatedAt: Date.now() };
        notes.push(note);
        await persistNote(note);
        await openNote(note.id);
        renderList();
      }
      async function deleteNote(id) {
        const note = findNote(id);
        if (!note) {
          return;
        }
        const ok = await confirmModal("'" + (note.title || '제목 없음') + "' 노트를 삭제할까요? 되돌릴 수 없습니다.", { danger: true, okText: '삭제' });
        if (!ok) {
          return;
        }
        notes = notes.filter(n => n.id !== id);
        if (dbManager.db) {
          dbManager.removeItem(STORE_NOTES, id).catch(() => {});
        }
        if (activeId === id) {
          if (notes.length) {
            const next = notes.slice().sort((a, b) => b.updatedAt - a.updatedAt)[0];
            await openNote(next.id);
          } else {
            await newNote();
          }
        }
        renderList();
        showToast('노트를 삭제했습니다.', 'success');
      }

      // ===== 자동 저장 =====
      function scheduleSave() {
        setSaveState('저장 중…');
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          const note = findNote(activeId);
          if (!note) {
            return;
          }
          note.content = getMd();
          note.title = deriveTitle(note.content);
          note.updatedAt = Date.now();
          try {
            await persistNote(note);
            setSaveState('저장됨 · ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }));
            renderList();
          } catch (e) {}
        }, 500);
      }
      editor.on('update', () => {
        if (loadingNote) {
          return;
        }
        scheduleSave();
      });
      editor.on('selectionUpdate', updateToolbarState);
      editor.on('transaction', updateToolbarState);

      // ===== 툴바 =====
      function chain() {
        return editor.chain().focus();
      }
      const sidebar = document.querySelector('.sidebar');
      const actions = {
        toggleSide: () => document.body.classList.toggle('side-collapsed'),
        undo: () => chain().undo().run(),
        redo: () => chain().redo().run(),
        h1: () => chain().toggleHeading({ level: 1 }).run(),
        h2: () => chain().toggleHeading({ level: 2 }).run(),
        h3: () => chain().toggleHeading({ level: 3 }).run(),
        bold: () => chain().toggleBold().run(),
        italic: () => chain().toggleItalic().run(),
        strike: () => chain().toggleStrike().run(),
        code: () => chain().toggleCode().run(),
        highlight: () => chain().toggleHighlight().run(),
        bulletList: () => chain().toggleBulletList().run(),
        orderedList: () => chain().toggleOrderedList().run(),
        taskList: () => chain().toggleTaskList().run(),
        blockquote: () => chain().toggleBlockquote().run(),
        codeBlock: () => chain().toggleCodeBlock().run(),
        hr: () => chain().setHorizontalRule().run(),
        table: async () => {
          const input = await promptModal('표 크기 (행 x 열)', '3 x 3');
          if (input === null) {
            return;
          }
          const nums = (input.match(/\d+/g) || []).map(Number);
          const rows = Math.min(Math.max(nums[0] || 3, 1), 30);
          const cols = Math.min(Math.max(nums[1] || 3, 1), 20);
          chain().insertTable({ rows, cols, withHeaderRow: true }).run();
        },
        alignLeft: () => chain().setTextAlign('left').run(),
        alignCenter: () => chain().setTextAlign('center').run(),
        alignRight: () => chain().setTextAlign('right').run(),
        link: async () => {
          const prev = editor.getAttributes('link').href || '';
          const url = await promptModal('링크 URL (비우면 링크 해제):', prev);
          if (url === null) {
            return;
          }
          if (url === '') {
            chain().extendMarkRange('link').unsetLink().run();
          } else {
            chain().extendMarkRange('link').setLink({ href: url }).run();
          }
        },
        image: async () => {
          const url = await promptModal('이미지 URL:', '');
          if (url) {
            chain().setImage({ src: url }).run();
          }
        }
      };
      document.getElementById('toolbar').addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-act]');
        if (!btn) {
          return;
        }
        const fn = actions[btn.dataset.act];
        if (fn) {
          fn();
        }
      });

      function updateToolbarState() {
        document.querySelectorAll('#toolbar .tb-btn[data-active]').forEach((btn) => {
          const spec = btn.dataset.active;
          let on = false;
          if (spec.indexOf('heading:') === 0) {
            on = editor.isActive('heading', { level: Number(spec.split(':')[1]) });
          } else {
            on = editor.isActive(spec);
          }
          btn.classList.toggle('active', on);
        });
        updateContextBar();
      }

      // ===== 컨텍스트 툴바(표/코드) =====
      const ctxbar = document.getElementById('ctxbar');
      const ctxTable = document.getElementById('ctxTable');
      const ctxCode = document.getElementById('ctxCode');
      const codeLang = document.getElementById('codeLang');
      // 언어 목록 채우기 (1회)
      (function fillLangs() {
        const langs = (TT.lowlight && TT.lowlight.listLanguages) ? TT.lowlight.listLanguages().slice().sort() : [];
        codeLang.innerHTML = '<option value="">(언어 없음)</option>' + langs.map(l => '<option value="' + l + '">' + l + '</option>').join('');
      })();
      function updateContextBar() {
        const inTable = editor.isActive('table');
        const inCode = editor.isActive('codeBlock');
        ctxTable.classList.toggle('active', inTable);
        ctxCode.classList.toggle('active', inCode);
        ctxbar.classList.toggle('show', inTable || inCode);
        if (inCode) {
          const lang = editor.getAttributes('codeBlock').language || '';
          if (codeLang.value !== lang) {
            codeLang.value = lang;
          }
        }
      }
      // 표 명령
      ctxTable.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-tbl]');
        if (!btn) {
          return;
        }
        const cmd = btn.dataset.tbl;
        const c = editor.chain().focus();
        const map = {
          addRowBefore: () => c.addRowBefore().run(),
          addRowAfter: () => c.addRowAfter().run(),
          addColumnBefore: () => c.addColumnBefore().run(),
          addColumnAfter: () => c.addColumnAfter().run(),
          deleteRow: () => c.deleteRow().run(),
          deleteColumn: () => c.deleteColumn().run(),
          toggleHeaderRow: () => c.toggleHeaderRow().run(),
          mergeOrSplit: () => c.mergeOrSplit().run(),
          deleteTable: () => c.deleteTable().run()
        };
        if (map[cmd]) {
          map[cmd]();
        }
      });
      // 코드 언어 변경
      codeLang.addEventListener('change', () => {
        editor.chain().focus().updateAttributes('codeBlock', { language: codeLang.value || null }).run();
      });

      // ===== 사이드바 이벤트(위임) =====
      document.getElementById('newNote').addEventListener('click', () => newNote());
      noteSearchEl.addEventListener('input', renderList);
      noteListEl.addEventListener('click', (e) => {
        const del = e.target.closest('button[data-del]');
        if (del) {
          e.stopPropagation();
          deleteNote(del.dataset.del);
          return;
        }
        const item = e.target.closest('.note-item[data-id]');
        if (item) {
          openNote(item.dataset.id);
        }
      });

      // ===== MD 붙여넣기 다이얼로그 =====
      const impOverlay = document.getElementById('mdImpOverlay');
      const impArea = document.getElementById('mdImpArea');
      function openImport() {
        impArea.value = '';
        impOverlay.classList.add('open');
        setTimeout(() => impArea.focus(), 30);
      }
      function closeImport() {
        impOverlay.classList.remove('open');
      }
      document.getElementById('btnImport').addEventListener('click', openImport);
      document.getElementById('mdImpCancel').addEventListener('click', closeImport);
      impOverlay.addEventListener('mousedown', (e) => {
        if (e.target === impOverlay) {
          closeImport();
        }
      });
      // 드래그앤드롭: .md 파일을 다이얼로그에 떨어뜨리면 내용 채우기 (md 뷰어처럼)
      const impBox = impOverlay.querySelector('.mdimp-box');
      ['dragenter', 'dragover'].forEach(ev => impBox.addEventListener(ev, (e) => {
        e.preventDefault();
        e.stopPropagation();
        impBox.classList.add('drag');
      }));
      ['dragleave', 'dragend'].forEach(ev => impBox.addEventListener(ev, (e) => {
        if (e.target === impBox || !impBox.contains(e.relatedTarget)) {
          impBox.classList.remove('drag');
        }
      }));
      impBox.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        impBox.classList.remove('drag');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (!f) {
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          impArea.value = String(reader.result || '');
          impArea.focus();
          showToast("'" + f.name + "' 내용을 불러왔습니다. 적용을 눌러 반영하세요.", 'success');
        };
        reader.readAsText(f);
      });
      impOverlay.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          e.stopPropagation();
          closeImport();
        }
      });
      document.getElementById('mdImpApply').addEventListener('click', () => {
        const text = impArea.value;
        if (!text.trim()) {
          closeImport();
          return;
        }
        setMd(text);
        scheduleSave();
        closeImport();
        editor.commands.focus('end');
        showToast('마크다운을 현재 노트에 적용했습니다.', 'success');
      });
      document.getElementById('mdImpNew').addEventListener('click', async () => {
        const text = impArea.value;
        if (!text.trim()) {
          closeImport();
          return;
        }
        const note = { id: genId(), title: deriveTitle(text), content: text, updatedAt: Date.now() };
        notes.push(note);
        await persistNote(note);
        await openNote(note.id);
        renderList();
        closeImport();
        showToast('새 노트로 추가했습니다.', 'success');
      });

      // ===== 파일 저장 / 열기 =====
      document.getElementById('btnSave').addEventListener('click', () => {
        const note = findNote(activeId);
        const blob = new Blob([getMd()], { type: 'text/markdown' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = ((note && note.title) || 'note').replace(/[\\/:*?"<>|]/g, '_') + '.md';
        a.click();
        URL.revokeObjectURL(a.href);
      });
      const mdFile = document.getElementById('mdFile');
      document.getElementById('btnOpen').addEventListener('click', () => mdFile.click());
      mdFile.addEventListener('change', () => {
        const f = mdFile.files[0];
        if (!f) {
          return;
        }
        const reader = new FileReader();
        reader.onload = async () => {
          const text = String(reader.result || '');
          const note = { id: genId(), title: deriveTitle(text), content: text, updatedAt: Date.now() };
          notes.push(note);
          await persistNote(note);
          await openNote(note.id);
          renderList();
          showToast("'" + f.name + "' 을 새 노트로 불러왔습니다.", 'success');
        };
        reader.readAsText(f);
        mdFile.value = '';
      });

      // Ctrl/Cmd+S → 즉시 저장(다운로드 아님, dbManager 저장 확정)
      window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
          e.preventDefault();
          clearTimeout(saveTimer);
          const note = findNote(activeId);
          if (note) {
            note.content = getMd();
            note.title = deriveTitle(note.content);
            note.updatedAt = Date.now();
            persistNote(note).then(() => {
              setSaveState('저장됨 · ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }));
              renderList();
            }).catch(() => {});
          }
        }
      });

      // ===== 초기 로드 =====
      const WELCOME_MD = [
        '# 노트 편집기에 오신 걸 환영합니다',
        '',
        '위지윅으로 바로 편집하는 노트 도구입니다. **첫 줄이 노트 제목**이 됩니다.',
        '',
        '- 왼쪽 목록에서 노트를 만들고 전환하세요 (`+ 새 노트`)',
        '- 편집 내용은 **자동 저장**됩니다',
        '- 상단 `〈MD〉` 로 마크다운 원문 보기 / `.md` 열기·저장 가능',
        '',
        '> 참고: 밑줄·하이라이트색·정렬 등 일부 서식은 마크다운으로 저장할 때 표준 문법이 없어 유실될 수 있습니다.'
      ].join('\n');

      (async function init() {
        try {
          await dbManager.init(DB_NAME, [STORE_NOTES, STORE_STATE]);
          const all = await dbManager.getAll(STORE_NOTES);
          notes = Object.values(all || {});
          // 구버전(단일 노트) → 노트로 이전
          if (notes.length === 0) {
            let legacy = await dbManager.getItem(STORE_STATE, 'content');   // 직전 버전의 단일 저장
            if (!legacy) {
              try {
                const ls = localStorage.getItem(LEGACY_LS_KEY);            // 그 이전 localStorage
                if (ls) {
                  legacy = ls;
                  localStorage.removeItem(LEGACY_LS_KEY);
                }
              } catch (e) {}
            }
            if (legacy) {
              const n = { id: genId(), title: deriveTitle(legacy), content: legacy, updatedAt: Date.now() };
              notes.push(n);
              await persistNote(n);
              await dbManager.removeItem(STORE_STATE, 'content').catch(() => {});
            }
          }
          // 여전히 없으면 환영 노트
          if (notes.length === 0) {
            const n = { id: genId(), title: deriveTitle(WELCOME_MD), content: WELCOME_MD, updatedAt: Date.now() };
            notes.push(n);
            await persistNote(n);
          }
          // 활성 노트 결정
          let savedActive = await dbManager.getItem(STORE_STATE, 'activeId');
          if (!findNote(savedActive)) {
            savedActive = notes.slice().sort((a, b) => b.updatedAt - a.updatedAt)[0].id;
          }
          renderList();
          await openNote(savedActive, { focus: false });
        } catch (e) {
          console.warn('노트 저장소 초기화 실패:', e);
          setMd(WELCOME_MD);
        }
        updateToolbarState();
      })();
    })();
  </script>
</body>
</html>
