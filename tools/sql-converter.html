<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL Converter Pro</title>
  <style>
    :root {
      --background-color: #f3f4f6;
      --text-color: #111827;
      --card-background-color: #ffffff;
      --border-color: #d1d5db;
      --primary-color: #059669;
      --primary-hover: #059669;
      --secondary-color: #4b5563;
      --secondary-hover: #374151;
      --accent-color: #2563eb;
    }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      margin: 0;
      background-color: var(--background-color);
      color: var(--text-color);
      padding: 2rem;
      display: flex;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 1000px;
    }
    .card {
      background-color: var(--card-background-color);
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary-color); }
    .field-group { margin-bottom: 1.25rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.875rem; }
    
    input[type="text"], textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.875rem;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    textarea { min-height: 150px; resize: vertical; }
    
    .stats {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 0.25rem;
      font-weight: 500;
    }
    
    .button-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.75rem;
      margin: 1.5rem 0;
    }
    button {
      padding: 0.75rem 1rem;
      border-radius: 0.375rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background-color: var(--primary-color); color: white; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background-color: var(--secondary-color); color: white; }
    .btn-secondary:hover { background-color: var(--secondary-hover); }
    
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    #completedSql { background-color: #f9fafb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>SQL Converter Pro</h1>
      
      <div class="field-group">
        <label for="inputSqlValue">Binding Parameters (e.g., [a, b, c] or log format)</label>
        <input type="text" id="inputSqlValue" placeholder="[value1, value2, ...]">
        <div id="cntInputSqlValue" class="stats">배열의 개수 : 0 개</div>
      </div>

      <div class="field-group">
        <label for="inputSql">SQL Input (Java code or Log)</label>
        <textarea id="inputSql" placeholder="SELECT * FROM table WHERE col = ?"></textarea>
        <div id="cntInputSql" class="stats">?의 개수 : 0 개</div>
      </div>

      <div class="button-group">
        <button id="btnConvert" class="btn-primary">Convert & Copy</button>
        <button id="btnFormat" class="btn-secondary">Pretty Print</button>
      </div>

      <div class="result-header">
        <label for="completedSql">Converted SQL</label>
        <span id="completedSqlAlert"></span>
      </div>
      <textarea id="completedSql" readonly placeholder="변환된 SQL이 여기에 표시됩니다..."></textarea>
    </div>
  </div>

  <script src="./shared-utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      /**
       * SQL 내의 ?를 배열의 값으로 치환
       */
      const bindParameters = (sql, params) => {
        let paramIdx = 0;
        return sql.replace(/\?/g, () => {
          if (paramIdx < params.length) {
            const val = params[paramIdx++].trim();
            // 숫자나 NULL이 아니면 따옴표 추가
            if (val.toUpperCase() === 'NULL' || !isNaN(val) && val !== '') {
              return val;
            }
            return `'${val}'`;
          }
          return '?';
        });
      };

      /**
       * 자바 코드 및 주석 정제
       */
      const cleaningData = (tmpSql) => {
        let tmpSqlArr = tmpSql.split('\n');
        let complSql = "";
        tmpSqlArr.forEach(sql => {
          let trimmedSql = sql.trim();
          if (!trimmedSql || trimmedSql.startsWith('//')) return;
          
          let commentIndex = trimmedSql.indexOf('//');
          if (commentIndex > -1) {
            trimmedSql = trimmedSql.substring(0, commentIndex).trim();
          }
          
          trimmedSql = trimmedSql.replace(/"\s*\+\s*"/g, '');
          trimmedSql = trimmedSql.replace(/^"|"$/g, '');
          complSql += trimmedSql + ' ';
        });
        return complSql.trim();
      };

      /**
       * 간단한 SQL 포맷팅
       */
      const formatSql = (sql) => {
        const keywords = ['SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'GROUP BY', 'ORDER BY', 'INSERT INTO', 'UPDATE', 'SET', 'VALUES', 'LEFT JOIN', 'INNER JOIN', 'ON'];
        let formatted = sql.replace(/\s+/g, ' ');
        keywords.forEach(key => {
          const regex = new RegExp(`\\s${key}\\s`, 'gi');
          formatted = formatted.replace(regex, `\n${key} `);
        });
        return formatted.trim();
      };

      const convertSql = () => {
        const valueInput = document.getElementById('inputSqlValue').value;
        // 로그 형식 [a, b, c] 에서 값만 추출
        let valueArr = valueInput.replace(/[\[\]]/g, '').split(',');
        if (valueArr.length === 1 && valueArr[0].trim() === '') valueArr = [];
        
        document.getElementById('cntInputSqlValue').textContent = `배열의 개수 : ${valueArr.length} 개`;

        const rawSql = document.getElementById('inputSql').value;
        let cleanSql = cleaningData(rawSql);
        
        const questionCount = (cleanSql.match(/\?/g) || []).length;
        document.getElementById('cntInputSql').textContent = `?의 개수 : ${questionCount} 개`;

        let resultSql = bindParameters(cleanSql, valueArr);
        
        if (resultSql && !resultSql.trim().endsWith(';')) {
          resultSql = resultSql.trim() + ';';
        }

        document.getElementById('completedSql').value = resultSql;

        if (resultSql) {
          copyAndAlert(resultSql, document.getElementById('completedSqlAlert'));
        }
      };

      document.getElementById('btnConvert').addEventListener('click', convertSql);
      
      document.getElementById('btnFormat').addEventListener('click', () => {
        const currentSql = document.getElementById('completedSql').value || document.getElementById('inputSql').value;
        if (currentSql) {
          document.getElementById('completedSql').value = formatSql(currentSql);
        }
      });
    });
  </script>
</body>
</html>
