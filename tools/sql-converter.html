<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL 로그 변환기</title>
  <style>
    :root {
      --primary: #059669;
      --primary-hover: #047857;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --code-bg: #f1f5f9;
      --warn: #f59e0b;
      --danger: #ef4444;
    }
    body.dark {
      --primary: #34d399;
      --primary-hover: #6ee7b7;
      --bg: #0d1117;
      --card-bg: #161b22;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --border: #30363d;
      --code-bg: #0d1117;
      --warn: #d29922;
      --danger: #f85149;
    }
    body.dark textarea, body.dark input[type="text"] { background: #0d1117; color: var(--text); }
    body.dark .btn { background: #161b22; color: #c9d1d9; }
    body.dark .btn:hover { background: #21262d; }
    body.dark .hint code { background: #21262d; }

    * { box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem;
      display: flex;
      justify-content: center;
    }
    .container { width: 100%; max-width: none; }
    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
    }
    header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
    h1 { margin: 0; font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem; }
    .badge { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: var(--primary); color: #fff; font-weight: 800; }

    .field-group { margin-bottom: 1.25rem; }
    .label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; gap: 0.5rem; flex-wrap: wrap; }
    label { font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .count { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
    .count.warn { color: var(--warn); }
    .count.ok { color: var(--primary); }

    .hint { font-size: 0.78rem; color: var(--text-muted); margin: 0.35rem 0 0; line-height: 1.5; }
    .hint code { background: var(--code-bg); padding: 0.1rem 0.35rem; border-radius: 4px; font-family: 'Fira Code', monospace; font-size: 0.92em; }

    input[type="text"], textarea {
      width: 100%;
      padding: 0.85rem;
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
      color: var(--text);
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(5,150,105,0.12); }
    textarea#inputSql { min-height: 340px; }
    textarea#completedSql { min-height: 340px; background: var(--code-bg); }
    /* 입력/결과 좌우 2단 (전체 폭 활용) */
    .io-grid { display: flex; gap: 1.5rem; align-items: flex-start; margin-bottom: 1.25rem; }
    .io-col { flex: 1; min-width: 0; }
    .io-col > .field-group { margin-bottom: 0; }
    /* 입력/결과 헤더 높이 통일 → 두 textarea 시작·끝 라인 정렬 */
    .io-col .label-row, .io-col .result-head { min-height: 2.25rem; box-sizing: border-box; align-items: center; margin-bottom: 0.6rem; }
    @media (max-width: 900px) {
      .io-grid { flex-direction: column; gap: 0; }
      textarea#inputSql, textarea#completedSql { min-height: 200px; }
    }
    textarea.drag-hover { box-shadow: inset 0 0 0 3px var(--primary); }

    .options { display: flex; gap: 1.25rem; align-items: center; flex-wrap: wrap; margin: 0.25rem 0 1.25rem; font-size: 0.82rem; color: var(--text-muted); font-weight: 700; }
    .options label { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; text-transform: none; letter-spacing: 0; color: var(--text-muted); font-size: 0.82rem; }

    .controls { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .controls .btn { flex: 0 0 auto; padding: 0.55rem 1.6rem; }
    .btn {
      padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border);
      font-weight: 700; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: #fff; color: var(--text); font-size: 0.9rem;
    }
    .btn:hover { background: #f1f5f9; border-color: var(--text-muted); }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }

    .result-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; gap: 0.5rem; flex-wrap: wrap; }
    .result-actions { display: flex; gap: 0.5rem; }
    #mismatchAlert { font-size: 0.78rem; font-weight: 800; }
    #mismatchAlert.warn { color: var(--warn); }
    #mismatchAlert.ok { color: var(--primary); }

    /* ===== 바인딩 매핑 표 (? → 치환값) ===== */
    .bind-section { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 2px dashed var(--border); }
    .bind-section > .bind-cap { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .bind-cap .hint { margin: 0; }
    table.bind-table { width: 100%; border-collapse: collapse; margin-top: 0.75rem; font-size: 0.85rem; }
    table.bind-table th, table.bind-table td { padding: 0.55rem 0.7rem; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
    table.bind-table th { color: var(--text-muted); font-weight: 800; text-transform: none; letter-spacing: 0; }
    table.bind-table td.idx { width: 3rem; color: var(--text-muted); font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; }
    table.bind-table td.val { font-family: 'Fira Code', Consolas, monospace; word-break: break-all; color: var(--primary); font-weight: 700; }
    table.bind-table td.typ { width: 9rem; white-space: nowrap; }
    table.bind-table td.typ .tg { font-size: 0.72rem; padding: 0.12rem 0.45rem; border-radius: 4px; background: var(--border); color: var(--text-muted); font-weight: 800; }
    table.bind-table tr.bad td { color: var(--warn); }

    /* ===== Responsive: 모바일 ===== */
    @media (max-width: 600px) {
      body { padding: 0.75rem; overflow-x: hidden; }
      .card { padding: 1.1rem; border-radius: 0.75rem; }
      h1 { font-size: 1.25rem; }
      .controls .btn { flex: 1; min-width: 0; }
    }
  </style>
  <script src="lib/shared-utils.js"></script>
  <script src="lib/portal-theme.js"></script>
  <script src="lib/toast-utils.js"></script>
  <script src="lib/file-drop-handler.js"></script>
</head>
<body>
  <div class="container">
    <div class="card">
      <header>
        <h1>🗃️ SQL 로그 변환기 <span class="badge">PRO</span></h1>
        <div style="display:flex; gap:0.5rem; align-items:center;">
          <select id="logMode" class="btn btn-sm" onchange="onModeChange()" title="로그 형식 — 보통 '자동'이면 알아서 감지합니다. 선택은 샘플/안내용입니다.">
            <option value="auto">자동 감지</option>
            <option value="mybatis">MyBatis</option>
            <option value="ibatis">iBATIS</option>
          </select>
          <button class="btn btn-sm" onclick="loadSample()">샘플 로드</button>
          <button class="btn btn-sm" onclick="clearAll()">비우기</button>
        </div>
      </header>

      <div class="field-group">
        <div class="label-row">
          <label for="inputSqlValue">바인딩 파라미터</label>
          <span id="cntInputSqlValue" class="count">파라미터 0개</span>
        </div>
        <input type="text" id="inputSqlValue" placeholder="123(Integer), 홍길동(String), null   또는   [123, 홍길동, NULL]">
        <p class="hint">MyBatis <code>Parameters:</code>(타입 괄호) 또는 iBATIS <code>Parameters:</code>+<code>Types:</code> 줄을 그대로 붙여넣으면 타입을 인식해 따옴표를 자동 처리합니다. <code>[a, b, c]</code> 배열도 지원.</p>
      </div>

      <div class="io-grid">
        <div class="io-col">
          <div class="field-group">
            <div class="label-row">
              <label for="inputSql">SQL 입력 / 로그</label>
              <span id="cntInputSql" class="count">? 0개</span>
            </div>
            <textarea id="inputSql" placeholder="SELECT * FROM users WHERE id = ? AND status = ?&#10;&#10;또는 MyBatis 로그 블록을 통째로 붙여넣으세요 (Preparing/Parameters 자동 분리)"></textarea>
            <p class="hint">자바 문자열 결합(<code>"..." + "..."</code>)·주석(<code>//</code>)을 정리합니다. <code>Preparing:</code>/<code>Executing Statement:</code> 로그 줄과 끝의 <code>| [..]</code> 꼬리표를 자동 분리합니다.</p>
          </div>
          <div class="options">
            <label><input type="checkbox" id="optAutoFormat" checked> 변환 후 자동 포맷</label>
            <label><input type="checkbox" id="optAutoCopy" checked> 변환 후 자동 복사</label>
            <label><input type="checkbox" id="optSemicolon" checked> 끝에 세미콜론(;) 추가</label>
          </div>
          <div class="controls">
            <button class="btn btn-primary" onclick="convertSql()">🔄 변환</button>
          </div>
        </div>
        <div class="io-col">
          <div class="result-head">
            <label for="completedSql">변환 결과</label>
            <div class="result-actions">
              <span id="mismatchAlert"></span>
              <button class="btn btn-sm" onclick="formatResult()">✨ 포맷</button>
              <button class="btn btn-sm" onclick="copyResult()">📋 복사</button>
              <button class="btn btn-sm" onclick="downloadResult()">💾 저장</button>
            </div>
          </div>
          <textarea id="completedSql" readonly placeholder="변환된 SQL이 여기에 표시됩니다..."></textarea>
          <div id="bindSection" class="bind-section" style="display:none;">
            <div class="bind-cap">
              <label>바인딩 매핑 (? → 값)</label>
              <span class="hint">각 <code>?</code>가 어떤 값으로 바뀌었는지 순서대로 보여줍니다.</span>
            </div>
            <table class="bind-table">
              <thead><tr><th style="width:3rem;">#</th><th>치환된 값</th><th style="width:9rem;">타입</th></tr></thead>
              <tbody id="bindBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const valueEl = $('inputSqlValue');
    const sqlEl = $('inputSql');
    const resultEl = $('completedSql');

    /* ---------- 숫자/타입 판정 ---------- */
    // MyBatis 타입명이 숫자 계열이면 따옴표를 붙이지 않는다.
    const NUMERIC_TYPES = /^(Integer|Long|Short|Byte|Double|Float|BigDecimal|BigInteger|Number|int|long|short|byte|double|float)$/i;
    const BOOL_TYPES = /^(Boolean|bool)$/i;

    function quote(v) {
      // SQL 문자열 이스케이프: ' -> ''
      return "'" + String(v).replace(/'/g, "''") + "'";
    }

    function bindValue(param) {
      const { value, type } = param;
      if (value === null || /^null$/i.test(String(value).trim())) {
        return 'NULL';
      }
      const v = String(value);
      if (type) {
        const st = String(type).split('.').pop();   // java.lang.Integer -> Integer
        if (NUMERIC_TYPES.test(st)) {
          return v.trim();
        }
        if (BOOL_TYPES.test(st)) {
          return v.trim();
        }
        return quote(v);
      }
      // 타입 정보가 없을 때(배열 형식): 순수 정수/소수만 그대로, 나머지는 따옴표
      const t = v.trim();
      if (t === '') {
        return "''";
      }
      if (/^null$/i.test(t)) {
        return 'NULL';
      }
      // 앞자리 0이 있는 값(전화번호/우편번호/사번)·지수표기는 문자열로 취급해 따옴표 유지
      if (/^-?(0|[1-9]\d*)(\.\d+)?$/.test(t)) {
        return t;
      }
      return quote(t);
    }

    /* ---------- 파라미터 파싱 ---------- */
    // 로그 줄 끝의 ' | [패키지.클래스]' 꼬리표 제거 (iBATIS/JDBC 로그)
    function stripLogTail(s) {
      return s.replace(/\s*\|\s*\[[\w.$]+\]\s*$/gm, '');
    }
    // "label: [ ... ]" 에서 대괄호 안 내용 추출 (없으면 null)
    function bracketAfter(text, label) {
      const m = text.match(new RegExp(label + '\\s*:\\s*\\[([^\\]]*)\\]', 'i'));
      return m ? m[1] : null;
    }
    const splitCsv = (s) => s.split(',').map(x => x.trim());

    function parseParams(raw) {
      if (!raw) {
        return [];
      }
      let s = stripLogTail(raw).trim();

      // iBATIS: Parameters + Types 가 함께 있으면 인덱스로 짝지어 정확한 타입 적용
      const pBracket = bracketAfter(s, 'Parameters');
      const tBracket = bracketAfter(s, 'Types');
      if (pBracket !== null && tBracket !== null) {
        const vals = splitCsv(pBracket);
        const types = splitCsv(tBracket);
        return vals.map((v, i) => ({ value: v, type: types[i] ? types[i].split('.').pop() : null }));
      }

      // "Parameters:" 접두어 제거
      const mb = s.match(/Parameters\s*:\s*([\s\S]*)$/i);
      if (mb) {
        s = mb[1].trim();
      }
      // 한 줄로 정리 (로그가 여러 줄일 수 있음)
      s = s.replace(/\s*\n\s*/g, ' ').trim();
      // 바깥 대괄호 제거 [a, b, c]
      s = s.replace(/^\[([\s\S]*)\]$/, '$1').trim();
      if (!s) {
        return [];
      }

      // 타입 마커가 있으면 타입 인식 토크나이저 사용 (값 내부 콤마 안전)
      if (/\([A-Za-z0-9_$.]+\)/.test(s)) {
        return tokenizeTyped(s);
      }
      // 단순 콤마 분리
      return s.split(',').map(p => ({ value: p.trim(), type: null }));
    }

    // "1(Integer), 강남구, 서울시(String), null" 처럼 값에 콤마가 있어도 (Type) 경계로 안전 분리
    function tokenizeTyped(s) {
      const out = [];
      const re = /\s*(null|[\s\S]*?\([A-Za-z0-9_$.]+\))\s*(?:,|$)/g;
      let m, guard = 0, lastEnd = 0;
      while ((m = re.exec(s)) !== null && guard++ < 5000) {
        if (m[0] === '') {
          re.lastIndex++;
          continue;
        }
        let token = m[1].trim();
        if (/^null$/i.test(token)) {
          out.push({ value: null, type: null });
        }
        else {
          const tm = token.match(/^([\s\S]*)\(([A-Za-z0-9_$.]+)\)$/);
          if (tm) {
            out.push({ value: tm[1].trim(), type: tm[2] });
          } else {
            out.push({ value: token, type: null });
          }
        }
        lastEnd = re.lastIndex;
        if (re.lastIndex >= s.length) {
          break;
        }
      }
      // 정규식이 소비하지 못한 꼬리(타입 없는 값들)도 콤마로 분리해 untyped 로 추가 (파라미터 밀림 방지)
      const rest = s.slice(lastEnd).trim();
      if (rest) {
        rest.split(',').forEach(v => { v = v.trim(); if (v) {
          out.push({ value: /^null$/i.test(v) ? null : v, type: null });
        } });
      }
      return out;
    }

    // 자바 라인주석(//) 제거 — 단, 문자열 리터럴('...' 또는 "...") 안의 // 는 보존
    function stripLineComment(line) {
      let inS = false, inD = false;
      for (let k = 0; k < line.length - 1; k++) {
        const c = line[k];
        if (inS) { if (c === "'") {
          inS = false;
        } }
        else if (inD) { if (c === '"') {
          inD = false;
        } }
        else if (c === "'") {
          inS = true;
        } else if (c === '"') {
          inD = true;
        } else if (c === '/' && line[k + 1] === '/') {
          return line.slice(0, k);
        }
      }
      return line;
    }

    /* ---------- 자바 코드/로그 정제 ---------- */
    function cleanSql(raw) {
      // 로그 블록이면 SQL 줄만 추출 (MyBatis: Preparing / iBATIS: Executing Statement)
      const prep = raw.match(/(?:Preparing|Executing\s+Statement)\s*:\s*([^\n]*)/i);
      let text = prep ? prep[1] : raw;
      // 로그 줄 끝의 ' | [패키지.클래스]' 꼬리표 제거
      text = text.replace(/\s*\|\s*\[[\w.$]+\]\s*$/gm, '');

      const lines = text.split('\n');
      let out = '';
      for (let line of lines) {
        let t = line.trim();
        if (!t) {
          continue;
        }
        t = stripLineComment(t).trim();               // 문자열 밖 // 만 주석으로 제거('http://' 보존)
        if (!t) {
          continue;
        }
        t = t.replace(/"\s*\+\s*"/g, '');             // "abc" + "def" -> abcdef
        t = t.replace(/^"|"$/g, '');                  // 줄 양끝 따옴표 제거
        out += t + ' ';
      }
      return out.replace(/\s+/g, ' ').trim();
    }

    // 문자열 리터럴 밖의 ?(플레이스홀더)만 카운트
    function countPlaceholders(sql) {
      let n = 0, inStr = false;
      for (let k = 0; k < sql.length; k++) {
        const c = sql[k];
        if (inStr) { if (c === "'") { if (sql[k + 1] === "'") {
          k++;
        } else {
          inStr = false;
        } } }
        else if (c === "'") {
          inStr = true;
        } else if (c === '?') {
          n++;
        }
      }
      return n;
    }

    function bindParameters(sql, params) {
      // 문자열 리터럴('...') 안의 ? 는 건드리지 않고, 밖의 ? 만 바인딩 ('' 이스케이프 처리)
      let i = 0, out = '', inStr = false;
      for (let k = 0; k < sql.length; k++) {
        const c = sql[k];
        if (inStr) {
          out += c;
          if (c === "'") { if (sql[k + 1] === "'") {
            out += sql[++k];
          } else {
            inStr = false;
          } }
        } else if (c === "'") {
          inStr = true;
          out += c;
        }
        else if (c === '?') {
          out += (i < params.length ? bindValue(params[i++]) : '?');
        } else {
          out += c;
        }
      }
      return out;
    }

    /* ---------- SQL 포맷터 ---------- */
    function formatSql(sql) {
      let s = sql.replace(/\s+/g, ' ').trim();
      if (!s) {
        return s;
      }
      // 'DELETE FROM'을 토큰으로 보호 → FROM 단독 분리 규칙이 건드리지 않게.
      // (구형 Safari/WebView는 lookbehind를 파싱 단계에서 throw → 스크립트 전체 사망하므로 lookbehind 미사용)
      s = s.replace(/\bDELETE\s+FROM\b/gi, '~~DELFROM~~');
      const major = [
        'SELECT', 'FROM', 'WHERE', 'GROUP BY', 'HAVING', 'ORDER BY', 'LIMIT', 'OFFSET',
        'INSERT INTO', 'VALUES', 'UPDATE', 'SET', 'UNION ALL', 'UNION'
      ];
      major.forEach(k => {
        const pat = k.replace(/ /g, '\\s+');
        s = s.replace(new RegExp('\\s+' + pat + '\\s+', 'gi'), '\n' + k + ' ');
      });
      // 보호 토큰 복원 → 'DELETE FROM'도 자체 줄로
      s = s.replace(/\s*~~DELFROM~~\s*/g, '\nDELETE FROM ');
      // JOIN 계열은 한 번에 처리(LEFT/INNER 등과 단독 JOIN 의 중복 분리 방지)
      s = s.replace(/\s+((?:LEFT|RIGHT|FULL|INNER|CROSS)(?:\s+OUTER)?\s+JOIN|JOIN)\s+/gi,
        (m, g) => '\n' + g.replace(/\s+/g, ' ').toUpperCase() + ' ');
      // ON / AND / OR 들여쓰기
      s = s.replace(/\s+(AND|OR)\s+/gi, '\n  $1 ');
      s = s.replace(/\s+ON\s+/gi, '\n  ON ');
      return s.split('\n').map(l => l.trimEnd()).join('\n').trim();
    }

    /* ---------- 개수/검증 표시 ---------- */
    function refreshCounts(qCount, pCount) {
      const pe = $('cntInputSqlValue');
      pe.textContent = `파라미터 ${pCount}개`;
      const qe = $('cntInputSql');
      qe.textContent = `? ${qCount}개`;

      const alert = $('mismatchAlert');
      if (qCount === 0) {
        alert.textContent = '';
        pe.className = qe.className = 'count';
        return;
      }
      if (qCount === pCount) {
        alert.textContent = `✓ ? ${qCount} = 파라미터 ${pCount}`;
        alert.className = 'ok';
        pe.className = qe.className = 'count ok';
      } else {
        alert.textContent = `⚠ ? ${qCount} ≠ 파라미터 ${pCount}`;
        alert.className = 'warn';
        pe.className = qe.className = 'count warn';
      }
    }

    /* ---------- 메인 동작 ---------- */
    function convertSql() {
      const rawSql = sqlEl.value;
      if (!rawSql.trim()) {
        showToast('SQL을 입력해주세요.', 'warning');
        return;
      }

      // 로그 블록이면 Parameters(+ iBATIS Types) 줄을 자동으로 파라미터 칸에 채움
      if (!valueEl.value.trim()) {
        const prm = rawSql.match(/Parameters\s*:\s*[^\n]*/i);
        const typ = rawSql.match(/Types\s*:\s*[^\n]*/i);
        if (prm) {
          valueEl.value = [prm[0], typ ? typ[0] : ''].filter(Boolean).join('\n');
        }
      }

      const params = parseParams(valueEl.value);
      const clean = cleanSql(rawSql);
      const qCount = countPlaceholders(clean);

      let result = bindParameters(clean, params);
      if ($('optSemicolon').checked && result && !result.trim().endsWith(';')) {
        result = result.trim() + ';';
      }
      if ($('optAutoFormat').checked) {
        result = formatSql(result);
      }

      resultEl.value = result;
      refreshCounts(qCount, params.length);
      renderBindTable(params, qCount);

      if (qCount !== params.length) {
        showToast(`? ${qCount}개와 파라미터 ${params.length}개가 일치하지 않습니다.`, 'warning');
      } else {
        showToast('변환 완료', 'success');
      }
      if ($('optAutoCopy').checked && result) {
        copyText(result);
      }
    }

    function formatResult() {
      const cur = resultEl.value || cleanSql(sqlEl.value);
      if (!cur.trim()) {
        showToast('포맷할 내용이 없습니다.', 'warning');
        return;
      }
      resultEl.value = formatSql(cur);
      showToast('포맷 완료', 'success');
    }

    async function copyResult() {
      if (!resultEl.value) {
        showToast('복사할 결과가 없습니다.', 'warning');
        return;
      }
      await copyText(resultEl.value);
      showToast('클립보드에 복사되었습니다.', 'success');
    }

    function downloadResult() {
      if (!resultEl.value) {
        showToast('저장할 결과가 없습니다.', 'warning');
        return;
      }
      download('converted_query.sql', resultEl.value);
    }

    function clearAll() {
      valueEl.value = '';
      sqlEl.value = '';
      resultEl.value = '';
      refreshCounts(0, 0);
      $('bindSection').style.display = 'none';
      sqlEl.focus();
    }

    /* ---------- 바인딩 매핑 표 (? → 치환값) ---------- */
    function bindKindLabel(param) {
      if (param.type) {
        return param.type.split('.').pop();
      }   // 명시 타입 (String, Integer ...)
      const b = bindValue(param);                            // 타입 없을 때: 추정
      if (b === 'NULL') {
        return 'NULL';
      }
      if (b === "''") {
        return '빈문자열(추정)';
      }
      if (/^'[\s\S]*'$/.test(b)) {
        return '문자열(추정)';
      }
      return '숫자(추정)';
    }

    function renderBindTable(params, qCount) {
      const body = $('bindBody');
      body.innerHTML = '';
      const n = Math.max(qCount, params.length);
      if (n === 0) {
        $('bindSection').style.display = 'none';
        return;
      }
      for (let i = 0; i < n; i++) {
        const tr = document.createElement('tr');
        const idx = document.createElement('td'); idx.className = 'idx'; idx.textContent = i + 1;
        const val = document.createElement('td'); val.className = 'val';
        const typ = document.createElement('td'); typ.className = 'typ';
        const tg = document.createElement('span'); tg.className = 'tg';
        if (i < qCount && i < params.length) {
          val.textContent = bindValue(params[i]);
          tg.textContent = bindKindLabel(params[i]);
        } else if (i < qCount) {                 // ? 보다 파라미터가 모자람
          tr.className = 'bad'; val.textContent = '(미바인딩 ?)'; tg.textContent = '없음';
        } else {                                  // 파라미터가 ? 보다 많음
          tr.className = 'bad'; val.textContent = bindValue(params[i]) + '   (초과 파라미터)'; tg.textContent = bindKindLabel(params[i]);
        }
        typ.appendChild(tg);
        tr.append(idx, val, typ);
        body.appendChild(tr);
      }
      $('bindSection').style.display = 'block';
    }

    // 모드별 샘플 (파싱은 자동 감지가 처리 — 샘플은 형식 학습용)
    const SAMPLES = {
      mybatis:
        '==>  Preparing: SELECT u.id, u.name, u.email FROM users u LEFT JOIN orders o ON o.user_id = u.id WHERE u.status = ? AND u.name = ? AND u.age > ? ORDER BY u.created_at DESC\n' +
        '==> Parameters: ACTIVE(String), 오\'브라이언(String), 20(Integer)',
      ibatis:
        '06/24 11:01:20 [http-nio-8080-exec-5] {pstm-105698} Executing Statement:  SELECT a.MESSAGE_ID, a.IO_TYPE, a.SEQ_NO FROM U2C_MESSAGE_FIELD_LIST a WHERE a.IO_TYPE = ? AND a.STATE != ? START WITH a.MESSAGE_ID = ? CONNECT BY NOCYCLE PRIOR a.MESSAGE_ID = a.PARENT_MESSAGE_ID  | [java.sql.PreparedStatement]\n' +
        '06/24 11:01:20 [http-nio-8080-exec-5] {pstm-105698} Parameters: [03, 06, MESG0000003352] | [java.sql.PreparedStatement]\n' +
        '06/24 11:01:20 [http-nio-8080-exec-5] {pstm-105698} Types: [java.lang.String, java.lang.String, java.lang.String] | [java.sql.PreparedStatement]'
    };

    function loadSample() {
      // 자동이면 iBATIS 예시(새로 지원된 3줄 형식)를 보여줌
      const mode = $('logMode').value === 'mybatis' ? 'mybatis' : 'ibatis';
      sqlEl.value = SAMPLES[mode];   // SQL+Parameters(+Types)를 통째로 → 자동 분리
      valueEl.value = '';
      convertSql();
    }

    // 빈 폼에서 모드를 바꾸면 그 모드 샘플을 바로 보여줌(작업 중이면 건드리지 않음)
    function onModeChange() {
      if (!sqlEl.value.trim() && !valueEl.value.trim() && $('logMode').value !== 'auto') {
        loadSample();
      }
    }

    // 입력 시 개수 실시간 갱신(가벼운 미리보기)
    function livePreview() {
      const clean = cleanSql(sqlEl.value);
      const qCount = countPlaceholders(clean);
      let pCount = parseParams(valueEl.value).length;
      // SQL칸에 Parameters 줄이 있고 파라미터칸이 비었으면 그것으로 미리보기
      if (!valueEl.value.trim()) {
        const prm = sqlEl.value.match(/Parameters\s*:\s*[^\n]*/i);
        const typ = sqlEl.value.match(/Types\s*:\s*[^\n]*/i);
        if (prm) {
          pCount = parseParams([prm[0], typ ? typ[0] : ''].filter(Boolean).join('\n')).length;
        }
      }
      refreshCounts(qCount, pCount);
    }
    const debounce = (fn, ms = 200) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };
    const debouncedPreview = debounce(livePreview, 200);   // 키 입력마다 전체 재파싱 방지
    valueEl.addEventListener('input', debouncedPreview);
    sqlEl.addEventListener('input', debouncedPreview);

    // Ctrl+Enter 로 변환
    [valueEl, sqlEl].forEach(el => el.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        convertSql();
      }
    }));

    // 파일 드래그앤드롭 (.sql/.log/.txt 등)
    const dropAsText = (el) => fileDropHandler.init(el, {
      onText: (content) => { el.value = content; livePreview(); showToast('파일을 불러왔습니다.', 'success'); },
      onOther: (file) => {
        const reader = new FileReader();
        reader.onload = (e) => { el.value = e.target.result; livePreview(); showToast('파일을 불러왔습니다.', 'success'); };
        reader.readAsText(file);
      },
      onImage: () => showToast('이미지는 지원하지 않습니다.', 'warning')
    });
    dropAsText(sqlEl);
  </script>
</body>
</html>
